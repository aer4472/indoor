      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({currentVideo:name||null,playbackTime:Math.round(el.video.currentTime||0)})
    });
  } catch {}
}

// ── Init ─────────────────────────────────────────────────────────
async function loadTVList() {
  try {
    showOverlay(`Conectando a ${API}...`);
    const tvs=await fetch(`${API}/player/tvs`).then(r=>r.json());
    el.tvSelect.innerHTML='<option value="">— Selecione uma TV —</option>';
    tvs.forEach(tv=>{ const o=document.createElement('option');o.value=tv.id;o.textContent=tv.name;o.dataset.name=tv.name;el.tvSelect.appendChild(o); });
  } catch(e) {
    el.tvSelect.innerHTML='<option value="">Erro ao carregar TVs</option>';
    showOverlay(`❌ Sem conexão com o servidor\n${API}\n\n${e.message}`,'error');
    el.errorBtns.classList.remove('hidden');
  }
}

async function startPlayer() {
  showOverlay('Conectando...');
  try {
    const data=await fetchConfig();
    playlist  = data.playlist  || [];
    widgets   = data.widgets   || [];
    emergency = data.emergency || {active:0};
    tvConf    = data.tv        || {};
    shuffleMode = !!(data.shuffle);
    if (shuffleMode && playlist.length) { buildShuffleOrder(playlist.length); playItem._shufflePos = 0; }

    if (!playlist.length && !emergency.active) {
      showOverlay('📺 Nenhuma playlist configurada\n\nAcesse o painel admin e atribua uma playlist a esta TV.\n\nAguardando atualização...', 'loading');
      el.spinner.style.display = 'block';
      // Tenta novamente a cada 30s sem precisar de interação
      clearTimeout(window._waitPlaylistTimer);
      window._waitPlaylistTimer = setTimeout(() => startPlayer(), 30000);
      return;
    }

    hideOverlay();
    el.media.classList.remove('hidden');
    isPlaying = true;

    if (tvConf.volume!=null) setVol(tvConf.volume);
    applyOrientation(tvConf.orientation || 'horizontal');

    renderWidgets(widgets).catch(console.warn);
    applyEmergency(emergency);
    initSponsors(data.sponsorGroups || []);

    if (!emergency.active && playlist.length) {
      toast(`▶ ${playlist.length} item(s)`);
      playItem(0);
    }

    connectSocket();
    startWeatherRefresh();

    clearInterval(syncTimer);
    syncTimer = setInterval(syncAndRefresh, 30000);
    clearInterval(hbTimer);
    hbTimer = setInterval(()=>{ const item=playlist[curIdx]; sendHeartbeat(item?.name||null); }, 15000);

    try { if ('wakeLock' in navigator) await navigator.wakeLock.request('screen'); } catch {}

    // Re-adquirir wake lock quando aba ganha foco (ex: TV saiu do descanso de tela)
    document.addEventListener('visibilitychange', async () => {
      if (document.visibilityState === 'visible' && 'wakeLock' in navigator) {
        try { await navigator.wakeLock.request('screen'); } catch {}
      }
    });

    // Fullscreen automático — tenta direto, se falhar aguarda 1 interação do usuário
    // Se veio de um reload do painel (_fs_reload), o browser já "confia" na sessão
    var needFS = !isFS();
    var fsFromReload = false;
    try { fsFromReload = sessionStorage.getItem('_fs_reload') === '1'; sessionStorage.removeItem('_fs_reload'); } catch {}

    if (needFS) {
      try {
        await document.documentElement.requestFullscreen();
      } catch {
        if (fsFromReload) {
          // Reload iniciado pelo painel: tentar de novo após pequeno delay
          // (alguns browsers aceitam na mesma "task" do reload)
          setTimeout(async function() {
            try { if (!isFS()) await document.documentElement.requestFullscreen(); } catch {}
          }, 500);
          setTimeout(async function() {
            try { if (!isFS()) await document.documentElement.requestFullscreen(); } catch {}
          }, 2000);
        }
        // Fallback: primeiro clique entra em fullscreen
        document.body.addEventListener('click', ()=>{ if(!isFS()) toggleFS(); }, {once:true});
      }
    }

  } catch(e) {
    showOverlay('Erro: '+e.message,'error');
    el.errorBtns.classList.remove('hidden');
  }
}

function loadCfg() { try { const s=localStorage.getItem('indoorTvCfg'); if(s) cfg=JSON.parse(s); } catch {} }
function saveCfg() { localStorage.setItem('indoorTvCfg',JSON.stringify(cfg)); }
function resetCfg() {
  localStorage.removeItem('indoorTvCfg'); cfg={tvId:null,tvName:null};
  clearInterval(syncTimer); clearInterval(hbTimer); clearInterval(wTimer);
  stopTimers(); stopSiren();
  if (socket) socket.disconnect(); init();
}

async function init() {
  // ?reset=1 na URL limpa config salva
  if (new URLSearchParams(window.location.search).get('reset') === '1') {
    localStorage.removeItem('indoorTvCfg');
    history.replaceState(null, '', window.location.pathname);
  }
  loadCfg();

  // Sem tvId salvo: mostra PIN imediatamente, sem falar com servidor
  if (!cfg.tvId) {
    showOverlay('Digite o PIN da TV', 'setup');
    setTimeout(() => document.querySelector('.pin-digit')?.focus(), 50);
    return;
  }

  // Tem tvId salvo: tenta reconectar com timeout curto
  let dotCount = 0;
  showOverlay('Conectando...', 'loading');

  // Animação de pontos
  const wakeMsg = setInterval(() => {
    dotCount++;
    el.overlayMsg.textContent = 'Conectando' + '.'.repeat((dotCount % 3) + 1);
  }, 600);

  // Timeout de 12s — se o servidor não responder, vai para PIN
  const safetyTimer = setTimeout(() => {
    clearInterval(wakeMsg);
    cfg.tvId = null; cfg.tvName = null; saveCfg();
    showOverlay('Digite o PIN da TV', 'setup');
    setTimeout(() => document.querySelector('.pin-digit')?.focus(), 50);
  }, 12000);

  try {
    await startPlayer();
    clearTimeout(safetyTimer);
    clearInterval(wakeMsg);
  } catch(e) {
    clearTimeout(safetyTimer);
    clearInterval(wakeMsg);
    cfg.tvId = null; cfg.tvName = null; saveCfg();
    showOverlay('Digite o PIN da TV', 'setup');
    setTimeout(() => document.querySelector('.pin-digit')?.focus(), 50);
  }
}

// ── PIN setup ────────────────────────────────────────────────────
(function setupPinInput() {
  const boxes = Array.from(document.querySelectorAll('.pin-digit'));

  boxes.forEach((box, i) => {
    box.addEventListener('input', e => {
      const v = e.target.value.replace(/\D/g,'');
      e.target.value = v ? v[v.length-1] : '';
      e.target.classList.toggle('filled', !!e.target.value);
      if (e.target.value && i < boxes.length - 1) boxes[i+1].focus();
      if (boxes.every(b => b.value)) $('auth-btn').click();
    });
    box.addEventListener('keydown', e => {
      if (e.key === 'Backspace' && !box.value && i > 0) {
        boxes[i-1].value = '';
        boxes[i-1].classList.remove('filled');
        boxes[i-1].focus();
      }
      if (e.key === 'Enter') $('auth-btn').click();
    });
    box.addEventListener('paste', e => {
      e.preventDefault();
      const txt = (e.clipboardData||window.clipboardData).getData('text').replace(/\D/g,'').substring(0,6);
      boxes.forEach((b,j) => { b.value = txt[j]||''; b.classList.toggle('filled', !!b.value); });
      if (txt.length >= 6) $('auth-btn').click();
      else boxes[Math.min(txt.length, 5)].focus();
    });
  });
})();

$('auth-btn').onclick = async () => {
  const boxes = Array.from(document.querySelectorAll('.pin-digit'));
  const pin = boxes.map(b => b.value).join('');
  if (pin.length < 6) { boxes[pin.length]?.focus(); return; }

  $('auth-btn').disabled = true;
  $('auth-btn').textContent = 'Verificando...';
  $('password-error').style.display = 'none';
  boxes.forEach(b => b.classList.remove('error'));

  try {
    const r = await fetch(`${API}/player/auth-tv`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ pin })
    });
    if (r.ok) {
      const data = await r.json();
      cfg.tvId   = data.tvId;
      cfg.tvName = data.tvName;
      saveCfg();
      await startPlayer();
    } else {
      $('password-error').style.display = 'block';
      boxes.forEach(b => { b.value=''; b.classList.remove('filled'); b.classList.add('error'); });
      setTimeout(() => boxes.forEach(b => b.classList.remove('error')), 600);
      boxes[0].focus();
    }
  } catch(e) {
    $('password-error').textContent = '❌ Erro de conexão com o servidor.';
    $('password-error').style.display = 'block';
  }
  $('auth-btn').disabled = false;
  $('auth-btn').textContent = '▶ Conectar';
};

$('connect-btn').onclick = async()=>{
  const sel=el.tvSelect; if(!sel.value){alert('Selecione uma TV');return;}
  cfg.tvId=sel.value; cfg.tvName=sel.options[sel.selectedIndex].dataset.name;
  saveCfg(); await startPlayer();
};
$('reset-btn').onclick = resetCfg;
$('retry-btn').onclick = ()=>location.reload();

document.addEventListener('visibilitychange',()=>{
  if (!document.hidden && isPlaying) { try{navigator.wakeLock?.request('screen');}catch{} }
});

init();
</script>
</div><!-- /stage -->
