<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#2563eb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="SmartVision Pro">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
  <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png">
  <title>SmartVision Pro — Painel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
  <style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700:wght@400;500;600;700;800&display=swap');

:root {
  --bg:        #F5F7FA;
  --bg2:       #FFFFFF;
  --bg3:       #F1F4F8;
  --bg4:       #E8EDF4;
  --sidebar:   #FFFFFF;

  --border:    #E2E8F0;
  --border2:   #CBD5E1;

  --text:      #1E293B;
  --text2:     #64748B;
  --text3:     #94A3B8;
  --text4:     #CBD5E1;

  --blue:      #0066FF;
  --blue2:     #0099FF;
  --blue-soft: #EFF6FF;
  --blue-mid:  #DBEAFE;

  --green:     #22C55E;
  --green-soft:#F0FDF4;
  --red:       #EF4444;
  --red-soft:  #FEF2F2;
  --yellow:    #F59E0B;
  --yellow-soft:#FFFBEB;
  --purple:    #8B5CF6;
  --purple-soft:#F5F3FF;

  --shadow-sm: 0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow:    0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04);
  --shadow-lg: 0 10px 40px rgba(0,0,0,.1),0 4px 12px rgba(0,0,0,.06);

  --r:    8px;
  --r-lg: 12px;
  --r-xl: 16px;
}

*, *::before, *::after { box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  margin: 0;
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  font-size: 13px;
  line-height: 1.5;
}

::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

/* ── ANIMATIONS ── */
@keyframes fadein  { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
@keyframes slideIn { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:none} }
@keyframes shimmer { 0%{background-position:-400% 0} 100%{background-position:400% 0} }
@keyframes spin    { to{transform:rotate(360deg)} }
@keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.75)} }
@keyframes float   { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
@keyframes fadeSlideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:none} }

.fadein   { animation: fadein .25s cubic-bezier(.22,1,.36,1) both; }
.slideIn  { animation: slideIn .2s cubic-bezier(.22,1,.36,1) both; }
.stagger-1{ animation-delay:.04s; }
.stagger-2{ animation-delay:.08s; }
.stagger-3{ animation-delay:.12s; }
.stagger-4{ animation-delay:.16s; }

/* ── SKELETON ── */
.skeleton {
  background: linear-gradient(90deg,#f1f5f9 25%,#e2e8f0 50%,#f1f5f9 75%);
  background-size: 400% 100%;
  animation: shimmer 1.6s ease infinite;
  border-radius: 6px;
}

/* ── DRAG ── */
.drag-item { cursor: grab; transition: background .15s, transform .15s; }
.drag-item:hover { background: var(--bg3) !important; }
.drag-item.dragging { opacity:.4; transform:scale(.98); }

/* ── STATUS BADGES ── */
.badge-online  { background:var(--green-soft); color:#16A34A; border:1px solid #BBF7D0; border-radius:20px; padding:2px 10px; font-size:11px; font-weight:600; display:inline-flex; align-items:center; gap:5px; }
.badge-offline { background:var(--red-soft);   color:#DC2626; border:1px solid #FECACA; border-radius:20px; padding:2px 10px; font-size:11px; font-weight:600; display:inline-flex; align-items:center; gap:5px; }
.badge-warn    { background:var(--yellow-soft); color:#D97706; border:1px solid #FDE68A; border-radius:20px; padding:2px 10px; font-size:11px; font-weight:600; display:inline-flex; align-items:center; gap:5px; }

/* ── DOTS ── */
.dot-online  { width:7px; height:7px; border-radius:50%; background:var(--green); flex-shrink:0; animation:pulse-dot 2.5s ease infinite; }
.dot-offline { width:7px; height:7px; border-radius:50%; background:var(--red);   flex-shrink:0; }
.dot-warn    { width:7px; height:7px; border-radius:50%; background:var(--yellow);flex-shrink:0; }

/* ── CARDS ── */
.sv-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-sm);
  transition: box-shadow .2s, border-color .2s, transform .2s;
}
.sv-card:hover { box-shadow:var(--shadow); border-color:var(--border2); transform:translateY(-1px); }

/* ── STAT CARD ── */
.stat-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--r-xl);
  padding: 20px 22px;
  box-shadow: var(--shadow-sm);
  transition: all .2s cubic-bezier(.22,1,.36,1);
  cursor: pointer;
  position: relative;
  overflow: hidden;
}
.stat-card:hover { box-shadow:var(--shadow); border-color:var(--blue); transform:translateY(-2px); }

/* ── BUTTONS ── */
.btn-primary {
  background: var(--blue);
  color: #fff;
  border: none;
  border-radius: var(--r);
  padding: 9px 18px;
  font-weight: 600;
  font-size: 13px;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  transition: all .18s;
  box-shadow: 0 1px 3px rgba(0,102,255,.3);
}
.btn-primary:hover { background:#0052CC; box-shadow:0 4px 12px rgba(0,102,255,.35); transform:translateY(-1px); }
.btn-primary:active { transform:translateY(0); }

.btn-sec {
  background: var(--bg2);
  color: var(--text2);
  border: 1px solid var(--border2);
  border-radius: var(--r);
  padding: 9px 18px;
  font-weight: 500;
  font-size: 13px;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  transition: all .18s;
}
.btn-sec:hover { background:var(--bg3); color:var(--text); border-color:var(--border2); }

/* ── INPUTS ── */
input, select, textarea {
  background: var(--bg2) !important;
  color: var(--text) !important;
  border: 1px solid var(--border2) !important;
  border-radius: var(--r) !important;
  font-family: 'Inter', sans-serif !important;
  font-size: 13px !important;
  transition: border-color .18s, box-shadow .18s !important;
}
input:focus, select:focus, textarea:focus {
  outline: none !important;
  border-color: var(--blue) !important;
  box-shadow: 0 0 0 3px rgba(0,102,255,.12) !important;
}
input::placeholder, textarea::placeholder { color: var(--text3) !important; }
select option { background: #fff; color: var(--text); }

/* ── TABLE ── */
table { width:100%; border-collapse:collapse; }
th { background:var(--bg3); color:var(--text2); font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; padding:9px 16px; text-align:left; border-bottom:1px solid var(--border); }
td { padding:12px 16px; border-bottom:1px solid var(--border); font-size:13px; color:var(--text); }
tr:last-child td { border-bottom:none; }
tr:hover td { background:var(--bg3); }

/* ── MODAL ── */
.sv-modal-backdrop {
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  z-index:99999;
  background:rgba(15,23,42,.55);
  backdrop-filter:blur(4px);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px 16px;
  overflow-y:auto;
  animation:fadein .15s ease;
}
.sv-modal {
  background:#FFFFFF;
  border:1px solid #E2E8F0;
  border-radius:16px;
  box-shadow:0 24px 64px rgba(0,0,0,.2),0 4px 16px rgba(0,0,0,.08);
  width:100%;
  max-width:560px;
  max-height:90vh;
  display:flex;
  flex-direction:column;
  position:relative;
  margin:auto;
  flex-shrink:0;
}
.sv-modal.wide { max-width:920px; }
.sv-modal.xl   { max-width:1100px; }
.sv-modal-header {
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 22px 14px;
  border-bottom:1px solid #E2E8F0;
  flex-shrink:0;
  border-radius:16px 16px 0 0;
  background:#fff;
  position:sticky;top:0;z-index:1;
}
.sv-modal-title { font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;font-weight:700;color:#1E293B; }
.sv-modal-body  { padding:18px 22px;overflow-y:auto;flex:1;min-height:0; }
.sv-modal-footer {
  padding:14px 22px;
  border-top:1px solid #E2E8F0;
  display:flex;gap:8px;justify-content:flex-end;
  flex-shrink:0;
  border-radius:0 0 16px 16px;
  background:#fff;
  position:sticky;bottom:0;z-index:1;
}

/* ── NAV ACTIVE ── */
.nav-active-indicator {
  position:absolute;left:0;top:50%;transform:translateY(-50%);
  width:3px;height:60%;
  background:var(--blue);
  border-radius:0 3px 3px 0;
}

/* ── TOP HEADER ── */
#top-header {
  position:sticky;top:0;z-index:50;
  background:rgba(255,255,255,.95);
  backdrop-filter:blur(12px);
  border-bottom:1px solid #E2E8F0;
  padding:0 24px;
  height:54px;
  display:flex;align-items:center;gap:16px;
}

/* ── PAGE CONTENT ── */
.page-content { padding:24px; max-width:1440px; width:100%; }
.page-title { font-family:'Plus Jakarta Sans',sans-serif; font-size:19px; font-weight:800; color:var(--text); margin:0 0 2px; letter-spacing:-.02em; }
.page-sub   { font-size:12.5px; color:var(--text3); margin:0; }

/* ── PANEL ── */
.panel { background:var(--bg2); border:1px solid var(--border); border-radius:var(--r-xl); overflow:hidden; box-shadow:var(--shadow-sm); }
.panel-header { padding:14px 18px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.panel-title  { font-family:'Plus Jakarta Sans',sans-serif; font-size:13px; font-weight:700; color:var(--text); }

/* ── GLASS ── */
.glass { background:rgba(255,255,255,.7); backdrop-filter:blur(12px); border:1px solid rgba(255,255,255,.9); border-radius:var(--r-lg); }

/* ── SIDEBAR NAV ── */
.nav-item {
  width:100%;display:flex;align-items:center;gap:9px;
  padding:8px 10px 8px 12px;border-radius:8px;border:none;
  cursor:pointer;font-size:13px;font-weight:500;
  font-family:'Inter',sans-serif;position:relative;
  background:transparent;color:var(--text2);
  transition:all .15s;text-align:left;
  margin-bottom:1px;
}
.nav-item:hover { background:var(--bg3); color:var(--text); }
.nav-item.active { background:var(--blue-soft); color:var(--blue); font-weight:600; }

/* ── MOBILE ── */
#sidebar { display:flex; }
#mobile-drawer { 
  display:flex;flex-direction:column;
  position:fixed;top:0;left:0;bottom:0;z-index:10000;
  width:260px;
  background:#fff;
  box-shadow:4px 0 32px rgba(0,0,0,.15);
  transform:translateX(-100%);
  transition:transform .28s cubic-bezier(.4,0,.2,1);
}
#mobile-drawer.open { transform:translateX(0); }
#mobile-overlay { 
  display:none;
  position:fixed;inset:0;z-index:9999;
  background:rgba(15,23,42,.45);
  backdrop-filter:blur(3px);
}
#mobile-overlay.show { display:block; }
#mobile-menu-btn { 
  display:none;
  position:fixed;top:10px;left:10px;z-index:200;
  width:38px;height:38px;border-radius:9px;
  border:1px solid #E2E8F0;cursor:pointer;
  align-items:center;justify-content:center;
  font-size:18px;
  background:#fff;
  color:#1E293B;
  box-shadow:0 2px 8px rgba(0,0,0,.1);
}
@media(max-width:768px){
  #sidebar { display:none!important; }
  #mobile-menu-btn { display:flex!important; }
  .page-content { padding:14px!important; }
  #top-header { padding:0 14px 0 56px!important; }
}

/* ── TAILWIND OVERRIDES FOR LIGHT ── */
.bg-white     { background:var(--bg2)!important }
.bg-gray-50   { background:var(--bg)!important }
.bg-gray-100  { background:var(--bg3)!important }
.bg-blue-600  { background:var(--blue)!important }
.bg-blue-50   { background:var(--blue-soft)!important }
.bg-red-50    { background:var(--red-soft)!important }
.bg-green-50  { background:var(--green-soft)!important }
.bg-yellow-50 { background:var(--yellow-soft)!important }
.bg-purple-50 { background:var(--purple-soft)!important }
.text-gray-900,.text-gray-800 { color:var(--text)!important }
.text-gray-700,.text-gray-600 { color:var(--text2)!important }
.text-gray-500,.text-gray-400 { color:var(--text3)!important }
.text-blue-600,.text-blue-700 { color:var(--blue)!important }
.text-blue-800 { color:#1D4ED8!important }
.text-red-600  { color:#DC2626!important }
.text-red-400  { color:#F87171!important }
.text-green-600{ color:#16A34A!important }
.text-yellow-600{color:#D97706!important }
.{color:#6D28D9!important }
.{color:#8B5CF6!important }
.border-gray-100,.border-gray-200 { border-color:var(--border)!important }
.border-gray-300{ border-color:var(--border2)!important }
.divide-gray-100>*+* { border-color:var(--border)!important }
.shadow-sm  { box-shadow:var(--shadow-sm)!important }
.rounded-xl,.rounded-lg { border-radius:var(--r)!important }
.rounded-2xl { border-radius:var(--r-lg)!important }
.hover\:bg-gray-50:hover { background:var(--bg3)!important }
.hover\:bg-blue-50:hover { background:var(--blue-soft)!important }
</style>
</head>
<body style="background:var(--bg)">
<div id="root"></div>
<div id="modal-root" style="position:relative;z-index:99999"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback} = React;
const API = window.location.origin+'/api';
let TOKEN = localStorage.getItem('smartvision_token')||'';

const api = {
  _f:(url,opts={})=>{const h={'Content-Type':'application/json',...(opts.headers||{})};if(TOKEN)h['Authorization']=`Bearer ${TOKEN}`;return fetch(url,{...opts,headers:h});},
  login:(u,p)=>fetch(`${API}/auth/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})}).then(r=>r.json()),
  getTVs:()=>api._f(`${API}/tvs`).then(r=>r.json()),
  createTV:d=>api._f(`${API}/tvs`,{method:'POST',body:JSON.stringify(d)}).then(r=>r.json()),
  updateTV:(id,d)=>api._f(`${API}/tvs/${id}`,{method:'PUT',body:JSON.stringify(d)}).then(r=>r.json()),
  deleteTV:id=>api._f(`${API}/tvs/${id}`,{method:'DELETE'}),
  regenPin:id=>api._f(`${API}/tvs/${id}/regen-pin`,{method:'POST'}).then(r=>r.json()),
  disconnectTV:id=>api._f(`${API}/tvs/${id}/disconnect`,{method:'POST'}).then(r=>r.json()),
  getPlaylists:()=>api._f(`${API}/playlists`).then(r=>r.json()),
  createPlaylist:d=>api._f(`${API}/playlists`,{method:'POST',body:JSON.stringify(d)}).then(r=>r.json()),
  updatePlaylist:(id,d)=>api._f(`${API}/playlists/${id}`,{method:'PUT',body:JSON.stringify(d)}).then(r=>r.json()),
  deletePlaylist:id=>api._f(`${API}/playlists/${id}`,{method:'DELETE'}),
  getVideos:()=>api._f(`${API}/videos`).then(r=>r.json()),
  uploadVideo:(file,dur)=>{const fd=new FormData();fd.append('video',file);fd.append('display_duration',dur||10);const h={};if(TOKEN)h['Authorization']=`Bearer ${TOKEN}`;return fetch(`${API}/videos/upload`,{method:'POST',headers:h,body:fd}).then(r=>r.json());},
  patchVideo:(id,d)=>api._f(`${API}/videos/${id}`,{method:'PATCH',body:JSON.stringify(d)}).then(r=>r.json()),
  encodeRotate:(id,rotation)=>api._f(`${API}/videos/${id}/encode-rotate`,{method:'POST',body:JSON.stringify({rotation})}).then(r=>r.json()),
  checkEncodeJob:(jobId)=>api._f(`${API}/videos/encode-job/${jobId}`).then(r=>r.json()),
  deleteVideo:id=>api._f(`${API}/videos/${id}`,{method:'DELETE'}),
  addYoutube:(url,name)=>api._f(`${API}/videos/youtube`,{method:'POST',body:JSON.stringify({url,name})}).then(r=>r.json()),
  getSchedules:(tvId)=>api._f(`${API}/schedules${tvId?`?tv_id=${tvId}`:''}`).then(r=>r.json()),
  createSchedule:d=>api._f(`${API}/schedules`,{method:'POST',body:JSON.stringify(d)}).then(r=>r.json()),
  updateSchedule:(id,d)=>api._f(`${API}/schedules/${id}`,{method:'PUT',body:JSON.stringify(d)}).then(r=>r.json()),
  deleteSchedule:id=>api._f(`${API}/schedules/${id}`,{method:'DELETE'}),
  getEmergency:()=>api._f(`${API}/emergency`).then(r=>r.json()),
  setEmergency:d=>api._f(`${API}/emergency`,{method:'POST',body:JSON.stringify(d)}).then(r=>r.json()),
  getWidgets:()=>api._f(`${API}/widgets`).then(r=>r.json()),
  createWidget:d=>api._f(`${API}/widgets`,{method:'POST',body:JSON.stringify(d)}).then(r=>r.json()),
  updateWidget:(id,d)=>api._f(`${API}/widgets/${id}`,{method:'PUT',body:JSON.stringify(d)}).then(r=>r.json()),
  deleteWidget:id=>api._f(`${API}/widgets/${id}`,{method:'DELETE'}),
  getUsers:()=>api._f(`${API}/users`).then(r=>r.json()),
  createUser:d=>api._f(`${API}/users`,{method:'POST',body:JSON.stringify(d)}).then(r=>r.json()),
  updateUser:(id,d)=>api._f(`${API}/users/${id}`,{method:'PUT',body:JSON.stringify(d)}).then(r=>r.json()),
  deleteUser:id=>api._f(`${API}/users/${id}`,{method:'DELETE'}),
  reloadTVs:(tvId)=>api._f(`${API}/tvs/reload`,{method:'POST',body:JSON.stringify({tv_id:tvId||null})}).then(r=>r.json()),
  getSettings:()=>api._f(`${API}/settings`).then(r=>r.json()),
  saveSettings:d=>api._f(`${API}/settings`,{method:'POST',body:JSON.stringify(d)}).then(r=>r.json()),
  getSponsors:()=>api._f(`${API}/sponsors`).then(r=>r.json()),
  createSponsorGroup:data=>api._f(`${API}/sponsors/groups`,{method:'POST',body:JSON.stringify(data)}).then(r=>r.json()),
  updateSponsorGroup:(gid,data)=>api._f(`${API}/sponsors/groups/${gid}`,{method:'PUT',body:JSON.stringify(data)}).then(r=>r.json()),
  deleteSponsorGroup:gid=>api._f(`${API}/sponsors/groups/${gid}`,{method:'DELETE'}).then(r=>r.json()),
  uploadSponsorLogo:(gid,file)=>{const fd=new FormData();fd.append('image',file);fd.append('name',file.name.replace(/\.[^.]+$/,''));const h={};if(TOKEN)h['Authorization']=`Bearer ${TOKEN}`;return fetch(`${API}/sponsors/groups/${gid}/upload`,{method:'POST',headers:h,body:fd}).then(r=>r.json());},
  deleteSponsorLogo:(gid,lid)=>api._f(`${API}/sponsors/groups/${gid}/logos/${lid}`,{method:'DELETE'}).then(r=>r.json()),
  reorderSponsorLogos:(gid,ids)=>api._f(`${API}/sponsors/groups/${gid}/order`,{method:'PUT',body:JSON.stringify({ids})}).then(r=>r.json()),
  uploadLogo:(file,type)=>{const fd=new FormData();fd.append('logo',file);fd.append('type',type||'sponsor');const h={};if(TOKEN)h['Authorization']=`Bearer ${TOKEN}`;return fetch(`${API}/settings/logo`,{method:'POST',headers:h,body:fd}).then(r=>r.json());},
  getPlans:()=>api._f(`${API}/plans`).then(r=>r.json()),
  createPlan:d=>api._f(`${API}/plans`,{method:'POST',body:JSON.stringify(d)}).then(r=>r.json()),
  updatePlan:(id,d)=>api._f(`${API}/plans/${id}`,{method:'PUT',body:JSON.stringify(d)}).then(r=>r.json()),
  deletePlan:id=>api._f(`${API}/plans/${id}`,{method:'DELETE'}).then(r=>r.json()),
  getMe:()=>api._f(`${API}/users/me`).then(r=>r.json()),
  suspendUser:(id,reason)=>api._f(`${API}/users/${id}/suspend`,{method:'POST',body:JSON.stringify({reason})}).then(r=>r.json()),
  activateUser:(id,days)=>api._f(`${API}/users/${id}/activate`,{method:'POST',body:JSON.stringify({days})}).then(r=>r.json()),
  renewUser:(id,days)=>api._f(`${API}/users/${id}/renew`,{method:'POST',body:JSON.stringify({days})}).then(r=>r.json()),

function Modal({title,onClose,onSave,children,wide,xl,saveLabel='Salvar',saveDanger=false,saving}) {
  const modalRoot = document.getElementById('modal-root') || document.body;

  React.useEffect(()=>{
    const prev = document.body.style.overflow;
    document.body.style.overflow = 'hidden';
    return ()=>{ document.body.style.overflow = prev; };
  },[]);

  const modal = (
    <div className="sv-modal-backdrop" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className={`sv-modal fadein${wide?' wide':xl?' wide xl':''}`} style={xl?{maxWidth:1100}:{}} onClick={e=>e.stopPropagation()}>
        <div className="sv-modal-header">
          <div className="sv-modal-title">{title}</div>
          <button onClick={onClose} style={{background:'#F1F5F9',border:'1px solid #E2E8F0',color:'#64748B',width:30,height:30,borderRadius:8,cursor:'pointer',fontSize:15,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}
            onMouseEnter={e=>{e.currentTarget.style.background='#FEF2F2';e.currentTarget.style.color='#DC2626';}}
            onMouseLeave={e=>{e.currentTarget.style.background='#F1F5F9';e.currentTarget.style.color='#64748B';}}>✕</button>
        </div>
        <div className="sv-modal-body">{children}</div>
        {onSave&&(
          <div className="sv-modal-footer">
            <button className="btn-sec" onClick={onClose}>Cancelar</button>
            <button className="btn-primary" onClick={onSave} disabled={saving}
              style={saveDanger?{background:'linear-gradient(135deg,#dc2626,#ef4444)'}:{}}>
              {saving?'Salvando...':saveLabel}
            </button>
          </div>
        )}
      </div>
    </div>
  );
  return ReactDOM.createPortal(modal, modalRoot);
}

}

// ── APP ──────────────────────────────────────────────────────────
function App(){
  const [loggedIn,setLoggedIn]=useState(!!TOKEN);
  const [username,setUsername]=useState(()=>{try{const t=TOKEN&&JSON.parse(atob(TOKEN.split('.')[1]));return t?.username||''}catch{return ''}});
  const [userRole,setUserRole]=useState(()=>{try{const t=TOKEN&&JSON.parse(atob(TOKEN.split('.')[1]));return t?.role||'operator'}catch{return 'operator'}});
  const [subWarning,setSubWarning]=useState(null);

  // Load subscription status
  useEffect(()=>{
    if(!loggedIn) return;
    api.getMe().then(me=>{
      if(!me||me.error) return;
      const days = me.days_remaining;
      const status = me.account_status;
      if(status==='trial') setSubWarning({type:'trial',days});
      else if(status==='expired') setSubWarning({type:'expired',days:0});
      else if(status==='suspended') setSubWarning({type:'suspended',days:0});
      else if(days!==null && days<=7) setSubWarning({type:'expiring',days});
    }).catch(()=>{});
  },[loggedIn]);
  const [userPlan,setUserPlan]=useState(()=>{try{const t=TOKEN&&JSON.parse(atob(TOKEN.split('.')[1]));return t?.plan||null}catch{return null}});
  const [page,setPage]=useState('dashboard');
  const [data,setData]=useState({tvs:[],videos:[],playlists:[],schedules:[],widgets:[],emergency:{active:0},sponsors:{sponsors:[],config:{}}});
  const [toast,setToast]=useState(null);
  const [reloading,setReloading]=useState(false);
  const [theme,setTheme]=useState({
    sidebarBg:'#111827', sidebarText:'#9ca3af', sidebarActive:'#2563eb',
    accentColor:'#2563eb', panelName:'SmartVision Pro', panelLogo:'/logo.png',
  });
  const sockRef=useRef(null);

  const showToast=(msg,type='success')=>{setToast({msg,type});setTimeout(()=>setToast(null),3500);};

  // Aplicar tema como variáveis CSS
  useEffect(()=>{
    const r=document.documentElement.style;
    r.setProperty('--sidebar-bg',   theme.sidebarBg);
    r.setProperty('--sidebar-text', theme.sidebarText);
    r.setProperty('--sidebar-active',theme.sidebarActive);
    r.setProperty('--accent',       theme.accentColor);
  },[theme]);

  const loadSettings=useCallback(async()=>{
    try{
      const s=await api.getSettings();
      if(s&&typeof s==='object'){
        setTheme(t=>({...t,...s}));
      }
    }catch{}
  },[]);

  const load=useCallback(async()=>{
    try{
      const [tvs,videos,playlists,schedules,widgets,emergency,spData]=await Promise.all([
        api.getTVs(),api.getVideos(),api.getPlaylists(),api.getSchedules(),api.getWidgets(),api.getEmergency(),api.getSponsors()
      ]);
      setData({
        tvs:Array.isArray(tvs)?tvs:[],
        videos:Array.isArray(videos)?videos:[],
        playlists:Array.isArray(playlists)?playlists:[],
        schedules:Array.isArray(schedules)?schedules:[],
        widgets:Array.isArray(widgets)?widgets:[],
        emergency:emergency||{active:0},
        sponsors:spData||{sponsors:[],config:{}},
      });
    }catch(e){console.warn('Load error:',e);}
  },[]);

  useEffect(()=>{if(loggedIn){load();loadSettings();}},[loggedIn,load,loadSettings]);
  useEffect(()=>{
    if(!loggedIn)return;
    const sock=io(window.location.origin);
    sockRef.current=sock;
    sock.on('connect',()=>sock.emit('join-admin'));
    sock.on('tvs-status-changed',()=>load());
    return()=>sock.disconnect();
  },[loggedIn]);
  useEffect(()=>{if(!loggedIn)return;const t=setInterval(load,20000);return()=>clearInterval(t);},[loggedIn,load]);

  const logout=()=>{TOKEN='';localStorage.removeItem('smartvision_token');setLoggedIn(false);window.location.href='/';};
  const onLogin=(u,role,plan)=>{setLoggedIn(true);setUsername(u);setUserRole(role||'operator');setUserPlan(plan||null);};

  const reloadTVs=async(tvId=null)=>{
    setReloading(tvId||'all');
    try{
      await api._f(`${API}/tvs/reload`,{method:'POST',body:JSON.stringify({tv_id:tvId||null})});
      showToast(tvId?'🔄 TV recarregada!':'🔄 Todas as TVs recarregadas!');
    }catch{showToast('Erro ao recarregar','error');}
    setTimeout(()=>setReloading(false),2500);
  };

  if(!loggedIn) return <LoginPage onLogin={onLogin}/>;

  const props={...data,onUpdate:load,showToast,reloadTVs,theme,setTheme,loadSettings,userRole,isAdmin:userRole==='admin'};
  const PAGE_LABELS={'dashboard':'Dashboard','tvs':'TVs','videos':'Mídias','playlists':'Playlists','schedules':'Agendamentos','widgets':'Widgets','emergency':'Emergência','sponsors':'Patrocinadores','reports':'Relatórios','users':'Usuários','plans':'Planos de Uso','settings':'Aparência'};
  const onlineTvs=(data.tvs||[]).filter(t=>t.status==='online').length;

  return (
    <div style={{display:'flex',height:'100vh',overflow:'hidden',background:'#F5F7FA'}}>
      <Sidebar page={page} setPage={setPage} logout={logout} username={username} userRole={userRole} userPlan={userPlan} reloadTVs={reloadTVs} reloading={reloading} tvs={data.tvs||[]}/>
      <div id="main-content" style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',minWidth:0,position:'relative'}}>
        {/* ── SUBSCRIPTION WARNING BANNER ── */}
        {subWarning&&subWarning.type==='trial'&&(
          <div style={{background:'linear-gradient(90deg,#EFF6FF,#DBEAFE)',borderBottom:'1px solid #BFDBFE',padding:'8px 24px',display:'flex',alignItems:'center',gap:10,fontSize:13}}>
            <span style={{fontSize:16}}>🎯</span>
            <span style={{fontWeight:600,color:'#1E40AF'}}>Modo demonstração ativo</span>
            <span style={{color:'#3B82F6'}}>—</span>
            <span style={{color:'#1E40AF'}}>
              {subWarning.days>1
                ? `${subWarning.days} dia${subWarning.days!==1?'s':''} restante${subWarning.days!==1?'s':''}`
                : '⚠️ Último dia de acesso!'}
            </span>
            <a href="https://wa.me/5591988196385?text=Quero contratar um plano do SmartVision Pro!" target="_blank"
              style={{marginLeft:'auto',padding:'5px 14px',background:'#2563EB',color:'#fff',borderRadius:7,fontSize:12,fontWeight:700,textDecoration:'none',display:'flex',alignItems:'center',gap:5}}>
              📱 Contratar plano
            </a>
          </div>
        )}
        {subWarning&&subWarning.type==='expiring'&&(
          <div style={{background:'linear-gradient(90deg,#FFFBEB,#FEF3C7)',borderBottom:'1px solid #FDE68A',padding:'8px 24px',display:'flex',alignItems:'center',gap:10,fontSize:13}}>
            <span style={{fontSize:16}}>⚠️</span>
            <span style={{fontWeight:600,color:'#92400E'}}>Sua assinatura vence em</span>
            <span style={{fontWeight:800,color:'#D97706',fontSize:15}}>{subWarning.days} dia{subWarning.days!==1?'s':''}</span>
            <a href="https://wa.me/5591988196385?text=Quero renovar meu plano" target="_blank" style={{marginLeft:'auto',padding:'5px 14px',background:'#D97706',color:'#fff',borderRadius:7,fontSize:12,fontWeight:700,textDecoration:'none'}}>
              Renovar agora →
            </a>
          </div>
        )}
        {subWarning&&subWarning.type==='expired'&&(
          <div style={{background:'linear-gradient(90deg,#FEF2F2,#FEE2E2)',borderBottom:'1px solid #FECACA',padding:'8px 24px',display:'flex',alignItems:'center',gap:10,fontSize:13}}>
            <span style={{fontSize:16}}>🔴</span>
            <span style={{fontWeight:600,color:'#991B1B'}}>Sua assinatura expirou</span>
            <span style={{color:'#DC2626'}}>— Acesso às funcionalidades bloqueado</span>
            <a href="https://wa.me/5591988196385?text=Preciso renovar meu plano" target="_blank" style={{marginLeft:'auto',padding:'5px 14px',background:'#DC2626',color:'#fff',borderRadius:7,fontSize:12,fontWeight:700,textDecoration:'none'}}>
              Regularizar agora →
            </a>
          </div>
        )}
        {subWarning&&subWarning.type==='suspended'&&(
          <div style={{background:'linear-gradient(90deg,#F5F3FF,#EDE9FE)',borderBottom:'1px solid #DDD6FE',padding:'8px 24px',display:'flex',alignItems:'center',gap:10,fontSize:13}}>
            <span style={{fontSize:16}}>🚫</span>
            <span style={{fontWeight:600,color:'#5B21B6'}}>Conta suspensa</span>
            <span style={{color:'#7C3AED'}}>— Entre em contato com o administrador</span>
            <a href="https://wa.me/5591988196385" target="_blank" style={{marginLeft:'auto',padding:'5px 14px',background:'#7C3AED',color:'#fff',borderRadius:7,fontSize:12,fontWeight:700,textDecoration:'none'}}>
              Falar com suporte →
            </a>
          </div>
        )}

        {/* ── TOP HEADER ── */}
        <div id="top-header" style={{background:'rgba(255,255,255,.92)',borderBottom:'1px solid #E2E8F0'}}>
          <div style={{flex:1,display:'flex',alignItems:'center',gap:8,minWidth:0}}>
            <span style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:700,fontSize:14,color:'#1E293B'}}>{PAGE_LABELS[page]||page}</span>

// ── DASHBOARD ────────────────────────────────────────────────────
function DashboardPage({tvs,playlists,schedules,videos,setPage,isAdmin,userRole}){
  const [stats,setStats]=useState(null);
  const [liveStatus,setLiveStatus]=useState([]);
  const [loading,setLoading]=useState(true);

  useEffect(()=>{
    Promise.all([
      api.getReportStats().catch(()=>({})),
      api.getReportStatus().catch(()=>[]),
    ]).then(([s,ls])=>{
      if(!s.error)setStats(s);
      if(Array.isArray(ls))setLiveStatus(ls);
      setLoading(false);
    });
  },[]);

  // Filtra liveStatus para mostrar apenas TVs do usuário (não-admin)
  const filteredTvs = React.useMemo(()=>{
    if(!isAdmin && tvs && tvs.length >= 0) {
      const myIds = new Set((tvs||[]).map(t=>t.id));
      return liveStatus.filter(t=>myIds.has(t.id));
    }
    return liveStatus;
  },[liveStatus,tvs,isAdmin]);

  const onlineCount=filteredTvs.filter(t=>t.status==='online').length;
  const offlineCount=filteredTvs.filter(t=>t.status==='offline').length;
  const activeScheds=schedules.filter(s=>s.active).length;
  const now=new Date();
  const h=now.getHours();
  const greeting=h<12?'Bom dia':h<18?'Boa tarde':'Boa noite';

  return (
    <div className="fadein page-content">

      {/* ── PAGE HEADER ── */}
      <div style={{marginBottom:24,display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:12}}>
        <div>
          <h2 className="page-title">{h<12?'Bom dia':h<18?'Boa tarde':'Boa noite'}, bem-vindo 👋</h2>
          <p className="page-sub">{now.toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</p>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:8}}>

      {/* ── KPI CARDS ── */}

        <div className="stagger-1 fadein"><StatCard icon="📺" label="TVs Online" value={loading?'—':`${onlineCount}`} color={onlineCount===tvs.length&&tvs.length>0?'green':offlineCount>0?'yellow':'blue'} sub={`de ${tvs.length} cadastradas`} onClick={()=>setPage('tvs')}/></div>
        <div className="stagger-1 fadein"><StatCard icon="🔴" label="TVs Offline" value={loading?'—':offlineCount} color={offlineCount>0?'red':'green'} sub={offlineCount>0?'Requer atenção':'Tudo normal'} onClick={()=>setPage('tvs')}/></div>
        <div className="stagger-2 fadein"><StatCard icon="🎬" label="Mídias" value={videos.length} color="blue" sub={`${videos.filter(v=>v.media_type==='video').length} vídeos`} onClick={()=>setPage('videos')}/></div>
        <div className="stagger-2 fadein"><StatCard icon="📋" label="Playlists" value={playlists.length} color="purple" onClick={()=>setPage('playlists')}/></div>
        <div className="stagger-3 fadein"><StatCard icon="📅" label="Agendamentos" value={activeScheds} color="yellow" sub="Ativos" onClick={()=>setPage('schedules')}/></div>
        {stats&&<div className="stagger-3 fadein"><StatCard icon="▶" label="Reproduções hoje" value={stats.playsToday||0} color="green"/></div>}
      </div>

      {/* ── MAIN GRID ── */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 280px',gap:16,marginBottom:16}}>

        {/* TV Monitor table */}
        <div className="panel fadein stagger-2">
          <div className="panel-header">

            </div>
            <div style={{display:'flex',alignItems:'center',gap:8}}>

                onMouseEnter={e=>e.currentTarget.style.background='#EFF6FF'}

function VideosPage({videos,onUpdate,showToast}){
  const [uploading,setUploading]=useState(false);const [progress,setProgress]=useState(0);
  const [displayDur,setDisplayDur]=useState(10);const fileRef=useRef();
  const [editV,setEditV]=useState(null);const [editName,setEditName]=useState('');const [editDur,setEditDur]=useState(10);const [editRot,setEditRot]=useState(0);
  const [showYt,setShowYt]=useState(false);const [ytUrl,setYtUrl]=useState('');const [ytName,setYtName]=useState('');
  const [dragOver,setDragOver]=useState(false);const [filter,setFilter]=useState('all');
  const [selected,setSelected]=useState(()=>new Set());
  const [selectMode,setSelectMode]=useState(false);
  const toggleSelect=id=>setSelected(s=>{const n=new Set(s);n.has(id)?n.delete(id):n.add(id);return n;});
  const selectAll=ids=>{setSelected(new Set(ids));};
  const clearSel=()=>{setSelected(new Set());setSelectMode(false);};
  const bulkDelete=async()=>{
    if(!selected.size)return;
    if(!confirm(`Remover ${selected.size} mídia(s) selecionada(s)?`))return;
    let ok=0,fail=0;
    for(const id of selected){
      const r=await api.deleteVideo(id);
      if(r.ok||r.status===200)ok++;else fail++;
    }
    clearSel();onUpdate();
    showToast(fail?`${ok} removidas, ${fail} com erro`:`${ok} mídias removidas`);
  };
  const [showFileBrowser,setShowFileBrowser]=useState(false);
  const [fbDrives,setFbDrives]=useState([]);const [fbPath,setFbPath]=useState(null);
  const [fbData,setFbData]=useState(null);const [fbLoading,setFbLoading]=useState(false);
  // fbSelected: Set de paths de arquivos individuais selecionados
  const [fbSelected,setFbSelected]=useState(()=>new Set());
  // fbSelFolders: Set de paths de pastas selecionadas (inteiras)
  const [fbSelFolders,setFbSelFolders]=useState(()=>new Set());
  const [fbImporting,setFbImporting]=useState(false);
  const [fbScanLoading,setFbScanLoading]=useState(()=>new Set()); // pastas em scan

  const fbOpen=async()=>{
    try{
      const r=await api._f('/api/files/drives');
      const d=await r.json();
      setFbDrives(d.drives||[]);
      const first=d.drives?.[0]?.path||'/';
      setFbPath(first);setFbData(null);
      setFbSelected(new Set());setFbSelFolders(new Set());
      setShowFileBrowser(true);
      fbNavigate(first);
    }catch(e){showToast('Erro ao abrir explorador: '+e.message,'error');}
  };

  const fbNavigate=async(p)=>{
    setFbLoading(true);setFbPath(p);setFbData(null);
    try{
      const r=await api._f('/api/files/ls?path='+encodeURIComponent(p));
      const d=await r.json();
      if(d.error){showToast(d.error,'error');setFbLoading(false);return;}
      setFbData(d);
    }catch(e){showToast('Erro: '+e.message,'error');}
    setFbLoading(false);
  };

  // Selecionar/deselecionar arquivo individual
  const fbToggleFile=f=>setFbSelected(s=>{
    const n=new Set(s);
    n.has(f.path)?n.delete(f.path):n.add(f.path);
    return n;
  });

  // Selecionar/deselecionar pasta inteira (com scan recursivo)
  const fbToggleFolder=async(folder)=>{
    const isSelected=fbSelFolders.has(folder.path);
    if(isSelected){
      // Deselecionar — remover todos os arquivos desta pasta do set
      setFbSelFolders(s=>{const n=new Set(s);n.delete(folder.path);return n;});
      // Remover arquivos desta pasta dos selecionados (prefixo do path)
      setFbSelected(s=>{
        const n=new Set(s);
        for(const p of n){ if(p.startsWith(folder.path)) n.delete(p); }
        return n;
      });
      return;
    }
    // Selecionar — fazer scan recursivo para obter todos os áudios
    setFbScanLoading(s=>{const n=new Set(s);n.add(folder.path);return n;});
    try{
      const r=await api._f('/api/files/scan?path='+encodeURIComponent(folder.path));
      const d=await r.json();
      if(d.audios?.length){
        setFbSelFolders(s=>{const n=new Set(s);n.add(folder.path);return n;});
        setFbSelected(s=>{const n=new Set(s);d.audios.forEach(a=>n.add(a.path));return n;});
        showToast('📁 '+d.audios.length+' músicas de "'+folder.name+'" selecionadas');
      }else{
        showToast('Nenhuma música encontrada em "'+folder.name+'"','error');
      }
    }catch(e){showToast('Erro ao escanear pasta','error');}
    setFbScanLoading(s=>{const n=new Set(s);n.delete(folder.path);return n;});
  };

  // Selecionar/deselecionar todos os arquivos da pasta atual
  const fbToggleAllCurrent=()=>{
    const audios=fbData?.audios||[];
    const allSelected=audios.every(a=>fbSelected.has(a.path));
    setFbSelected(s=>{
      const n=new Set(s);
      audios.forEach(a=>allSelected?n.delete(a.path):n.add(a.path));
      return n;
    });
  };

  const fbTotalSelected=fbSelected.size;

  const fbImport=async()=>{
    if(!fbSelected.size)return;setFbImporting(true);
    // Precisamos dos objetos completos — juntar de fbData e das pastas selecionadas
    // Enviamos apenas path e name; o servidor cuida do resto
    const files=[...fbSelected].map(p=>({path:p,name:p.split(/[\/]/).pop()}));
    try{
      const r=await api._f('/api/files/import',{method:'POST',body:JSON.stringify({files})});
      const d=await r.json();
      setFbImporting(false);setShowFileBrowser(false);
      setFbSelected(new Set());setFbSelFolders(new Set());
      onUpdate();
      showToast('✅ '+(d.imported||0)+' música(s) importada(s)!');
    }catch(e){setFbImporting(false);showToast('Erro: '+e.message,'error');}
  };
  const [encodeJob,setEncodeJob]=useState(null); // {jobId, progress, status, rot}
  const encodeIntervalRef=useRef(null);

  const upload=async files=>{
    if(!files?.length)return;setUploading(true);
    for(let i=0;i<files.length;i++){setProgress(Math.round((i+1)/files.length*100));await api.uploadVideo(files[i],displayDur);}
    setProgress(100);setTimeout(()=>{setUploading(false);setProgress(0);},500);
    onUpdate();showToast(`${files.length} arquivo(s) enviado(s)!`);
  };
  const saveYt=async()=>{const r=await api.addYoutube(ytUrl,ytName);if(r.error){showToast(r.error,'error');return;}setShowYt(false);setYtUrl('');setYtName('');onUpdate();showToast('YouTube adicionado!');};
  const saveEdit=async()=>{await api.patchVideo(editV.id,{original_name:editName,display_duration:editDur,rotation:editRot});setEditV(null);onUpdate();showToast('Atualizado!');};
  const del=async id=>{if(!confirm('Remover mídia?'))return;await api.deleteVideo(id);onUpdate();showToast('Removido');};
  const ytId=url=>{const m=url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/shorts\/|youtube\.com\/live\/)([a-zA-Z0-9_-]{11})/);return m?m[1]:null;};
  const badge=v=>v.media_type==='youtube'&&v.mime_type==='youtube_playlist'?{bg:'bg-red-700',l:'📋 YT List'}:v.media_type==='youtube'?{bg:'bg-red-500',l:'▶ YT'}:v.media_type==='image'?{bg:'bg-purple-500',l:'🖼 IMG'}:v.media_type==='pdf'?{bg:'bg-orange-500',l:'📄 PDF'}:v.media_type==='audio'?{bg:'bg-green-600',l:'🎵 MP3'}:{bg:'bg-blue-500',l:'🎬 VID'};
  const filtered=videos.filter(v=>filter==='all'||v.media_type===filter);

  const startEncode=async(videoId, rot)=>{
    if(!rot){showToast('Selecione uma rotação antes de re-encode.','error');return;}
    if(!confirm(`Re-encodar o vídeo com ${rot}° permanentemente? O arquivo original será substituído.`))return;
    const r=await api.encodeRotate(videoId, rot);
    if(r.error){showToast(r.error,'error');return;}
    const job={jobId:r.jobId,progress:0,status:'running',rot};
    setEncodeJob(job);
    setEditV(null); // fecha o modal de edição
    showToast('Re-encode iniciado! Acompanhe o progresso.');
    encodeIntervalRef.current=setInterval(async()=>{
      const s=await api.checkEncodeJob(r.jobId);
      setEncodeJob(j=>({...j,progress:s.progress,status:s.status,error:s.error}));
      if(s.status==='done'){
        clearInterval(encodeIntervalRef.current);
        onUpdate();showToast('✅ Vídeo re-encodado com sucesso! A rotação foi aplicada no arquivo.');
        setTimeout(()=>setEncodeJob(null),3000);
      } else if(s.status==='error'){
        clearInterval(encodeIntervalRef.current);
        showToast('Erro no re-encode: '+(s.error||'desconhecido'),'error');
        setTimeout(()=>setEncodeJob(null),5000);
      }
    },1500);
  };

  return (
    <div className="fadein" style={{padding:"24px",maxWidth:1200}}>
      <div className="flex items-center justify-between mb-4">
        <h2 className="text-xl md:text-2xl font-bold">Mídias</h2>
        <div className="flex items-center gap-1.5">
          <label className="text-xs text-gray-500 hidden md:block">Img/PDF (s):</label>
          <input type="number" min="3" max="120" value={displayDur} onChange={e=>setDisplayDur(+e.target.value)} className="w-12 border border-gray-200 rounded-lg px-1.5 py-1 text-sm text-center"/>
          <button onClick={()=>setShowYt(true)} className="bg-red-600 hover:bg-red-700 text-white px-3 py-1.5 rounded-lg text-xs font-medium transition">▶ YT</button>
          <button onClick={fbOpen} className="bg-green-600 hover:bg-green-700 text-white px-3 py-1.5 rounded-lg text-xs font-medium transition">📁 Pasta</button>
          <button onClick={()=>fileRef.current.click()} className="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1.5 rounded-lg text-xs font-medium transition">+ Upload</button>
        </div>
      </div>
      {/* Filtros + Selecionar */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:8,marginBottom:12,flexWrap:'wrap'}}>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {[['all','Todos'],['video','Vídeos'],['audio','Áudio'],['image','Imagens'],['pdf','PDFs'],['youtube','YouTube']].map(([v,l])=>(
            <button key={v} onClick={()=>setFilter(v)} style={{padding:'6px 12px',borderRadius:8,fontSize:12,fontWeight:600,border:'none',cursor:'pointer',transition:'all .15s',background:filter===v?'#0066FF':'#F1F5F9',color:filter===v?'#fff':'#64748B'}}>
              {l}
            </button>
          ))}
        </div>
        <button onClick={()=>{setSelectMode(m=>!m);if(selectMode)clearSel();}} style={{fontSize:12,fontWeight:600,padding:'7px 14px',borderRadius:8,border:`1px solid ${selectMode?'#0066FF':'#E2E8F0'}`,background:selectMode?'#EFF6FF':'#fff',color:selectMode?'#0066FF':'#64748B',cursor:'pointer',transition:'all .15s',display:'flex',alignItems:'center',gap:5,whiteSpace:'nowrap'}}>
          {selectMode?'✕ Cancelar':'☑ Selecionar'}
        </button>
      </div>
      <div className={`border-2 border-dashed rounded-xl p-4 text-center mb-4 cursor-pointer transition ${dragOver?'border-blue-400 bg-blue-50':'border-gray-200 hover:border-blue-300'}`}
        onClick={()=>fileRef.current.click()} onDragOver={e=>{e.preventDefault();setDragOver(true);}} onDragLeave={()=>setDragOver(false)}
        onDrop={e=>{e.preventDefault();setDragOver(false);upload(e.dataTransfer.files);}}>
        <div className="text-2xl mb-1">{dragOver?'📥':'🎬'}</div>
        <p className="text-gray-500 text-sm">Arraste ou clique para enviar</p>
        <p className="text-gray-400 text-xs">Vídeos · Imagens · PDFs · até 500MB</p>
      </div>
      <input ref={fileRef} type="file" multiple accept="video/*,image/*,application/pdf" className="hidden" onChange={e=>upload(e.target.files)}/>
      {uploading&&<div className="bg-blue-50 rounded-xl p-3 mb-4 flex items-center gap-3"><div className="flex-1 bg-blue-200 rounded-full h-2"><div className="bg-blue-600 h-2 rounded-full transition-all" style={{width:`${progress}%`}}></div></div><span className="text-blue-700 text-sm">{progress}%</span></div>}
      {/* Progress bar de re-encode */}
      {encodeJob&&<div className={`rounded-xl p-3 mb-4 ${encodeJob.status==='error'?'bg-red-50 border border-red-200':'bg-blue-50 border border-blue-100'}`}>
        <div className="flex items-center justify-between mb-1.5">
          <span className="text-sm font-semibold text-blue-700">
            {encodeJob.status==='done'?'✅ Re-encode concluído!':encodeJob.status==='error'?'❌ Erro no re-encode':`⚙️ Re-encodando vídeo (↻${encodeJob.rot}°)…`}
          </span>
          <span className="text-xs text-blue-500 font-mono">{encodeJob.progress}%</span>
        </div>
        {encodeJob.status==='running'&&<div className="bg-blue-200 rounded-full h-2"><div className="bg-blue-600 h-2 rounded-full transition-all" style={{width:`${encodeJob.progress}%`}}></div></div>}
        {encodeJob.status==='error'&&<p className="text-xs text-red-600 mt-1">{encodeJob.error}</p>}
        <p className="text-xs text-blue-400 mt-1">O arquivo será substituído. As TVs atualizarão automaticamente.</p>
      </div>}

      {/* Bulk action bar */}
      {selectMode&&(
        <div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',background:'#EFF6FF',border:'1px solid #BFDBFE',borderRadius:10,marginBottom:12}}>
          <span style={{fontSize:13,fontWeight:600,color:'#2563EB'}}>{selected.size} selecionada{selected.size!==1?'s':''}</span>
          <button onClick={()=>selectAll(filtered.map(v=>v.id))} style={{fontSize:12,color:'#2563EB',background:'none',border:'none',cursor:'pointer',fontWeight:600,padding:'4px 8px',borderRadius:6,transition:'background .15s'}} onMouseEnter={e=>e.currentTarget.style.background='#DBEAFE'} onMouseLeave={e=>e.currentTarget.style.background='none'}>Selecionar todos ({filtered.length})</button>
          <div style={{flex:1}}/>
          <button onClick={bulkDelete} style={{fontSize:12,fontWeight:700,padding:'6px 14px',borderRadius:8,border:'1px solid #FECACA',background:'#FEF2F2',color:'#DC2626',cursor:'pointer',transition:'all .15s'}} onMouseEnter={e=>e.currentTarget.style.background='#FEE2E2'} onMouseLeave={e=>e.currentTarget.style.background='#FEF2F2'}>🗑 Remover {selected.size>0?`(${selected.size})`:''}</button>
          <button onClick={clearSel} style={{fontSize:12,padding:'6px 12px',borderRadius:8,border:'1px solid #E2E8F0',background:'#fff',color:'#64748B',cursor:'pointer'}}>✕ Cancelar</button>
        </div>
      )}

      <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-2.5">
        {filtered.map(v=>{const b=badge(v);const isSel=selected.has(v.id);return(
          <div key={v.id} onClick={selectMode?()=>toggleSelect(v.id):undefined}
            className="sv-card border border-gray-100 shadow-sm overflow-hidden group fadein"
            style={{cursor:selectMode?'pointer':'default',outline:isSel?'2px solid #0066FF':'none',outlineOffset:2,position:'relative'}}>
          {isSel&&<div style={{position:'absolute',top:6,right:6,zIndex:10,width:20,height:20,borderRadius:6,background:'#0066FF',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:12,fontWeight:700}}>✓</div>}
            <div className="relative bg-gray-900 h-24 flex items-center justify-center overflow-hidden">
              {v.media_type==='audio'?<div className="w-full h-full flex flex-col items-center justify-center bg-gradient-to-br from-green-900 to-emerald-800 gap-1"><span className="text-3xl">🎵</span><span className="text-white text-xs font-bold">MP3</span></div>:v.media_type==='youtube'?v.mime_type==='youtube_playlist'?<div className="w-full h-full flex flex-col items-center justify-center bg-red-900 gap-1"><span className="text-2xl">📋</span><span className="text-white text-xs font-bold">Playlist YT</span></div>:<><img src={`https://img.youtube.com/vi/${v.filename}/mqdefault.jpg`} className="w-full h-full object-cover opacity-90"/><div className="absolute inset-0 flex items-center justify-center"><div className="bg-red-600 rounded-full w-7 h-7 flex items-center justify-center text-white text-xs">▶</div></div></>
              :v.media_type==='image'?<img src={`/storage/videos/${v.filename}`} className="w-full h-full object-cover"/>
              :v.media_type==='pdf'?<div className="text-4xl">📄</div>
              :<div className="relative w-full h-full"><video className="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition" src={`/storage/videos/${v.filename}`} muted preload="metadata" onMouseEnter={e=>e.target.play()} onMouseLeave={e=>{e.target.pause();e.target.currentTime=0;}}/></div>}
              <div className="absolute top-1 left-1 flex gap-1">
                <span className={`px-1.5 py-0.5 rounded text-xs font-medium text-white ${b.bg}`}>{b.l}</span>
                {(v.rotation||0)!==0&&<span className="px-1.5 py-0.5 rounded text-xs font-medium text-white bg-amber-500">↻{v.rotation}°</span>}
              </div>
            </div>
            <div className="p-2">
              <p className="text-xs font-medium text-gray-800 truncate">{v.original_name}</p>
              <p className="text-xs text-gray-400 mt-0.5">{v.media_type==='audio'?'Áudio MP3':v.media_type==='youtube'?v.mime_type==='youtube_playlist'?'Playlist YouTube':'YouTube':v.media_type==='image'||v.media_type==='pdf'?`${v.display_duration||10}s`:fmt.dur(v.duration)} · {fmt.size(v.size||0)}</p>
              <div className="flex gap-1 mt-1.5">
                <button onClick={()=>{setEditV(v);setEditName(v.original_name);setEditDur(v.display_duration||10);setEditRot(v.rotation||0);}} className="flex-1 text-xs text-gray-500 hover:text-blue-600 border border-gray-100 py-1 rounded transition">✏️</button>
                <button onClick={()=>del(v.id)} className="flex-1 text-xs text-gray-500 hover:text-red-500 border border-gray-100 py-1 rounded transition">🗑️</button>
              </div>
            </div>
          </div>
        );})}
        {filtered.length===0&&!uploading&&<div className="col-span-5 text-center py-12 text-gray-400"><div className="text-3xl mb-2">🎬</div><p>Nenhuma mídia</p></div>}
      </div>
      {editV&&<Modal title="Editar Mídia" onClose={()=>setEditV(null)} onSave={saveEdit}>
        <Lbl>Nome</Lbl><Inp value={editName} onChange={setEditName}/>
        {(editV.media_type==='image'||editV.media_type==='pdf')&&<><Lbl>Tempo de exibição (s)</Lbl><input type="number" min="3" max="300" value={editDur} onChange={e=>setEditDur(+e.target.value)} style={{width:"100%",padding:"9px 12px",marginBottom:12,borderRadius:8,border:"1px solid #CBD5E1",background:"#fff",color:"#1E293B",fontSize:13}}/></>}
        <Lbl>Rotação individual na TV</Lbl>
          <p className="text-xs text-gray-400 mb-2">0° = sem rotação. Configure aqui a rotação individual desta mídia.</p>
          <div className="grid grid-cols-4 gap-2 mb-1">
            {[{v:0,l:'0°'},{v:90,l:'90°'},{v:180,l:'180°'},{v:270,l:'270°'}].map(({v,l})=>(
              <button key={v} type="button" onClick={()=>setEditRot(v)}
                className={`flex flex-col items-center gap-1 py-2.5 rounded-xl border-2 text-xs font-semibold transition ${editRot===v?'border-blue-500 bg-blue-50 text-blue-700':'border-gray-200 bg-white text-gray-500 hover:border-blue-300'}`}>
                <span style={{display:'inline-block',transform:`rotate(${v}deg)`,fontSize:16,lineHeight:1,marginBottom:2}}>▶</span>
                {l}
              </button>
            ))}
          </div>
          {editRot!==0&&<p className="text-xs text-amber-600 mt-1 mb-1">↻ Esta mídia girará {editRot}° na TV.</p>}
        {editV.media_type==='video'&&editRot!==0&&<>
          <div className="mt-3 pt-3 border-t border-gray-100">
            <div className="bg-orange-50 border border-orange-200 rounded-xl p-3 mb-2">
              <p className="text-xs font-semibold text-orange-800 mb-1">📺 TV Samsung com Tizen antigo?</p>
              <p className="text-xs text-orange-700 mb-2">CSS transform não funciona para vídeo no Tizen. Use o re-encode para <strong>queimar a rotação no arquivo</strong> — a TV toca normalmente sem precisar de nenhum truque CSS.</p>
              <button type="button" onClick={()=>startEncode(editV.id, editRot)}
                className="w-full bg-orange-500 hover:bg-orange-600 text-white py-2 rounded-lg text-xs font-semibold transition">
                ⚙️ Re-encodar com {editRot}° permanentemente
              </button>
            </div>
          </div>
        </>}
      </Modal>}
      {/* ── Modal: Importar músicas da pasta ── */}
      {showFileBrowser&&<Modal title="📁 Importar Músicas" onClose={()=>{setShowFileBrowser(false);setFbSelected(new Set());setFbSelFolders(new Set());}} onSave={fbImport} saveLabel={fbImporting?'Importando...':fbTotalSelected>0?`Importar ${fbTotalSelected} música(s)`:'Selecione músicas ou pastas'} wide>
        {/* Drives */}
        {fbDrives.length>1&&<div className="flex gap-1.5 mb-3 flex-wrap">
          {fbDrives.map(d=><button key={d.path} onClick={()=>fbNavigate(d.path)} className={`px-3 py-1.5 rounded-lg text-xs font-mono font-bold border transition ${fbPath?.startsWith(d.path)?'bg-blue-600 text-white border-blue-600':'bg-white border-gray-200 hover:border-blue-300'}`}>{d.label}</button>)}
        </div>}
        {/* Breadcrumb */}
        <div className="flex items-center gap-2 bg-gray-50 rounded-lg px-3 py-2 mb-3 text-xs font-mono text-gray-600 overflow-x-auto">
          <span>📂</span>
          <span className="truncate flex-1">{fbPath||'...'}</span>
          {fbData?.parent&&<button onClick={()=>fbNavigate(fbData.parent)} className="text-blue-500 hover:text-blue-700 flex-shrink-0 font-sans font-semibold whitespace-nowrap">⬆ Voltar</button>}
        </div>
        {fbLoading&&<div className="text-center py-8 text-gray-400 text-sm">⏳ Carregando...</div>}
        {fbData&&!fbLoading&&<div className="space-y-3">
          {/* Pastas — clique navega, checkbox seleciona toda a pasta */}
          {fbData.folders.length>0&&<div>
            <p className="text-xs text-gray-400 font-semibold uppercase tracking-wide mb-2">Pastas</p>
            <div className="space-y-1 max-h-48 overflow-y-auto">
              {fbData.folders.map(folder=>{
                const isSel=fbSelFolders.has(folder.path);
                const isScanning=fbScanLoading.has(folder.path);
                return(
                  <div key={folder.path} className={`flex items-center gap-2 rounded-lg border transition ${isSel?'bg-yellow-50 border-yellow-300':'border-gray-100 hover:border-gray-200 hover:bg-gray-50'}`}>
                    {/* Checkbox para selecionar pasta inteira */}
                    <button onClick={(e)=>{e.stopPropagation();fbToggleFolder(folder);}} disabled={isScanning}
                      className={`w-8 h-full flex items-center justify-center flex-shrink-0 rounded-l-lg transition ${isSel?'bg-yellow-400':'hover:bg-gray-100'}`}>
                      {isScanning?<span className="text-xs animate-spin">⏳</span>
                        :<span className={`w-4 h-4 rounded border flex items-center justify-center text-xs ${isSel?'bg-yellow-500 border-yellow-500 text-white':'border-gray-300'}`}>{isSel?'✓':''}</span>}
                    </button>
                    {/* Clique no nome navega para dentro */}
                    <button onClick={()=>fbNavigate(folder.path)} className="flex items-center gap-2 flex-1 py-2 pr-3 text-left min-w-0">
                      <span className="text-lg flex-shrink-0">{isSel?'📂':'📁'}</span>
                      <span className="text-xs font-medium truncate">{folder.name}</span>
                      {folder.audioCount>0&&<span className="ml-auto text-xs text-gray-400 flex-shrink-0">{folder.audioCount} 🎵</span>}
                      <span className="text-gray-300 text-xs flex-shrink-0">›</span>
                    </button>
                  </div>
                );
              })}
            </div>
          </div>}
          {/* Arquivos de áudio na pasta atual */}
          {fbData.audios.length>0?<div>
            <div className="flex items-center justify-between mb-2">
              <p className="text-xs text-gray-400 font-semibold uppercase tracking-wide">Músicas aqui ({fbData.audios.length})</p>
              <button onClick={fbToggleAllCurrent} className="text-xs text-blue-500 hover:text-blue-700 font-medium">
                {fbData.audios.every(a=>fbSelected.has(a.path))?'Desmarcar tudo':'Selecionar tudo'}
              </button>
            </div>
            <div className="space-y-1 max-h-48 overflow-y-auto">
              {fbData.audios.map(f=>{const sel=fbSelected.has(f.path);return(
                <div key={f.path} onClick={()=>fbToggleFile(f)} className={`flex items-center gap-2.5 px-3 py-2 rounded-lg cursor-pointer border transition ${sel?'bg-green-50 border-green-300':'border-transparent hover:bg-gray-50'}`}>
                  <span className={`w-4 h-4 rounded border flex items-center justify-center text-xs flex-shrink-0 ${sel?'bg-green-500 border-green-500 text-white':'border-gray-300'}`}>{sel?'✓':''}</span>
                  <span className="text-base">🎵</span>
                  <span className="text-xs truncate flex-1">{f.name}</span>
                  <span className="text-xs text-gray-400 flex-shrink-0">{(f.size/1024/1024).toFixed(1)}MB</span>
                </div>
              );})}
            </div>
          </div>:fbData.folders.length===0&&<div className="text-center py-8 text-gray-400">
            <div className="text-3xl mb-2">📭</div><p className="text-sm">Pasta vazia</p>
          </div>}
        </div>}
        {/* Rodapé com contagem total selecionada */}
        {fbTotalSelected>0&&<div className="mt-4 bg-green-50 border border-green-200 rounded-xl px-4 py-3 flex items-center justify-between">
          <div>
            <p className="text-sm font-semibold text-green-700">🎵 {fbTotalSelected} música(s) selecionada(s)</p>
            {fbSelFolders.size>0&&<p className="text-xs text-green-500 mt-0.5">{fbSelFolders.size} pasta(s) completa(s) incluída(s)</p>}
          </div>
          <button onClick={()=>{setFbSelected(new Set());setFbSelFolders(new Set());}} className="text-xs text-green-600 hover:text-green-800 font-medium border border-green-300 rounded-lg px-2 py-1">Limpar</button>
        </div>}
      </Modal>}

      {showYt&&<Modal title="▶ Adicionar YouTube" onClose={()=>{setShowYt(false);setYtUrl('');}} onSave={saveYt}>
        <div className="bg-yellow-50 border border-yellow-200 rounded-lg p-3 mb-3 text-xs text-yellow-800">⚠️ Vídeos com restrição de incorporação não funcionarão.</div>
        <Lbl>URL do YouTube ou Playlist</Lbl><Inp value={ytUrl} onChange={setYtUrl} placeholder="youtube.com/watch?v=... ou /playlist?list=..."/>
        {ytUrl&&(()=>{
  const plMatch=ytUrl.match(/[?&]list=([a-zA-Z0-9_-]+)/);
  if(plMatch)return <div className="mb-3 p-3 bg-red-50 rounded-lg"><p className="text-sm font-semibold text-red-700">📋 Playlist detectada</p><p className="text-xs text-red-500 mt-1">ID: {plMatch[1]}</p><p className="text-xs text-gray-500 mt-1">Todos os vídeos da playlist serão reproduzidos em sequência</p></div>;
  const id=ytId(ytUrl);
  return id?<div className="mb-3"><img src={`https://img.youtube.com/vi/${id}/mqdefault.jpg`} className="w-full rounded-lg"/><p className="text-xs text-green-600 mt-1">✅ Vídeo: {id}</p></div>:<p className="text-xs text-red-500 mb-3">URL inválida</p>;
})()}
        <Lbl>Nome (opcional)</Lbl><Inp value={ytName} onChange={setYtName} placeholder="Ex: Vídeo institucional"/>
      </Modal>}
    </div>
  );
}

function CityVerifier({cardForm, setCardForm}){
  const [status,setStatus]=useState(null); // null | 'loading' | 'ok' | 'error'
  const [results,setResults]=useState([]);

  const set=(k,v)=>setCardForm(f=>({...f,[k]:v}));

  const verify=async()=>{
    const city=(cardForm.city||'').trim();
    if(!city)return;
    setStatus('loading');setResults([]);
    try{
      const r=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=8&language=pt&format=json`);
      const j=await r.json();
      let rs=(j.results||[]);
      // Priorizar Brasil
      const br=rs.filter(x=>x.country_code==='BR');
      let list=br.length?br:rs;
      // Filtrar por estado se informado
      const st=(cardForm.state||'').toUpperCase().trim();
      if(st&&br.length>1){
        const filtered=br.filter(x=>(x.admin1||'').toUpperCase().includes(st)||(x.admin1_code||'').toUpperCase().includes(st));
        if(filtered.length)list=filtered;
      }
      setResults(list.slice(0,5));
      setStatus(list.length?'ok':'error');
    }catch{setStatus('error');setResults([]);}
  };

  const pick=(r)=>{
    set('city',r.name);
    set('state',r.admin1||'');
    set('_lat',r.latitude);
    set('_lon',r.longitude);
    setStatus(null);setResults([]);
  };

  const confirmed = cardForm._lat && cardForm._lon;

  return(<>
    <div className="grid grid-cols-2 gap-2">
      <div>
        <Lbl>Cidade</Lbl>
        <Inp value={cardForm.city||''} onChange={v=>{set('city',v);set('_lat',null);set('_lon',null);setStatus(null);setResults([]);}} placeholder="Ex: Belém"/>
      </div>
      <div>
        <Lbl>Estado (opcional)</Lbl>
        <Inp value={cardForm.state||''} onChange={v=>{set('state',v);set('_lat',null);set('_lon',null);setStatus(null);setResults([]);}} placeholder="Ex: PA"/>
      </div>
    </div>

    {/* Botão verificar */}
    <button
      type="button"
      onClick={verify}
      disabled={status==='loading'||!(cardForm.city||'').trim()}
      className="w-full flex items-center justify-center gap-2 px-3 py-2 rounded-lg text-sm font-medium border-2 transition mb-2 disabled:opacity-40"
      style={{
        borderColor: confirmed?'#16a34a':status==='error'?'#dc2626':'#3b82f6',
        background:  confirmed?'#f0fdf4':status==='error'?'#fef2f2':'#eff6ff',
        color:       confirmed?'#15803d':status==='error'?'#b91c1c':'#1d4ed8',
      }}>
      {status==='loading'
        ? <><span className="inline-block animate-spin">⏳</span>Buscando...</>
        : confirmed
          ? <>✅ Confirmada: {cardForm.city}{cardForm.state?`, ${cardForm.state}`:''}</>
          : status==='error'
            ? <>❌ Cidade não encontrada — tente outro nome</>
            : <>🔍 Verificar cidade</>
      }
    </button>

    {/* Lista de resultados */}
    {results.length>0&&(
      <div className="border border-blue-200 rounded-xl overflow-hidden mb-3 shadow-sm">
        <div className="bg-blue-50 px-3 py-1.5 text-xs font-semibold text-blue-700">
          {results.length} resultado{results.length>1?'s':''} — clique para confirmar
        </div>
        {results.map((r,i)=>(
          <button key={i} type="button" onClick={()=>pick(r)}
            className="w-full flex items-center justify-between px-3 py-2.5 hover:bg-blue-50 border-t border-blue-100 transition text-left">
            <div>
              <div className="text-sm font-semibold text-gray-800">{r.name}</div>
              <div className="text-xs text-gray-500">
                {[r.admin2,r.admin1,r.country].filter(Boolean).join(' · ')}
              </div>
            </div>
            <div className="text-right flex-shrink-0 ml-3">
              <div className="text-xs text-gray-400 font-mono">{r.latitude?.toFixed(2)}°, {r.longitude?.toFixed(2)}°</div>
              {r.country_code==='BR'&&<span className="text-xs bg-green-100 text-green-700 px-1.5 py-0.5 rounded-full">🇧🇷 Brasil</span>}
            </div>
          </button>
        ))}
      </div>
    )}

    <Lbl>Unidade de temperatura</Lbl>
    <Sel value={cardForm.unit||'C'} onChange={v=>set('unit',v)}>
      <option value="C">Celsius (°C)</option>
      <option value="F">Fahrenheit (°F)</option>
    </Sel>
  </>);
}

function PlaylistsPage({playlists,videos,onUpdate,showToast}){
  const [plSelected,setPlSelected]=useState(()=>new Set());
  const [plSelectMode,setPlSelectMode]=useState(false);
  const togglePlSel=id=>setPlSelected(s=>{const n=new Set(s);n.has(id)?n.delete(id):n.add(id);return n;});
  const clearPlSel=()=>{setPlSelected(new Set());setPlSelectMode(false);};
  const bulkDeletePl=async()=>{
    if(!plSelected.size)return;
    if(!confirm(`Remover ${plSelected.size} playlist(s)?`))return;
    for(const id of plSelected) await api.deletePlaylist(id);
    clearPlSel();onUpdate();showToast(`${plSelected.size} playlist(s) removidas`);
  };
  const [modal,setModal]=useState(false);
  const [edit,setEdit]=useState(null);
  const [form,setForm]=useState({name:'',videoIds:[]});
  const [dragIdx,setDragIdx]=useState(null);
  const [cardModal,setCardModal]=useState(null); // {type, editing, itemId}
  const [cardForm,setCardForm]=useState({});
  const [cardSaving,setCardSaving]=useState(false);
  const [tab,setTab]=useState('media'); // 'media' | 'cards'
  const [mediaFilter, setMediaFilter] = React.useState('all');
  const [mediaSearch, setMediaSearch] = React.useState('');

  const [showFileBrowser, setShowFileBrowser] = useState(false);
  const [fbPath, setFbPath] = useState(null);
  const [fbData, setFbData] = useState(null);
  const [fbLoading, setFbLoading] = useState(false);
  const [fbSelected, setFbSelected] = useState([]);
  const [fbImporting, setFbImporting] = useState(false);
  const [drives, setDrives] = useState([]);

  const open=(p=null)=>{
    setEdit(p);
    setForm(p?{name:p.name,videoIds:p.videos.map(v=>v.id),shuffle:!!(p.shuffle)}:{name:'',videoIds:[],shuffle:false});
    setTab('media');
    setModal(true);
  };
  const duplicate=async p=>{
    const newName=`${p.name} (cópia)`;
    const r=await api.createPlaylist({name:newName,videoIds:p.videos.map(v=>v.id)});
    if(r.error){showToast(r.error,'error');return;}
    onUpdate();showToast(`"${newName}" criada!`);
  };
  const save=async()=>{
    if(!form.name.trim())return;
    edit?await api.updatePlaylist(edit.id,form):await api.createPlaylist(form);
    setModal(false);onUpdate();showToast(edit?'Salva! TVs notificadas.':'Criada!');
  };
  const del=async id=>{if(!confirm('Remover?'))return;await api.deletePlaylist(id);onUpdate();showToast('Removida');};
  const toggle=id=>setForm(f=>({...f,videoIds:f.videoIds.includes(id)?f.videoIds.filter(v=>v!==id):[...f.videoIds,id]}));
  const drop=i=>{
    if(dragIdx===null||dragIdx===i)return;
    const ids=[...form.videoIds];const[item]=ids.splice(dragIdx,1);ids.splice(i,0,item);
    setForm(f=>({...f,videoIds:ids}));setDragIdx(null);
  };
  const getV=id=>videos.find(v=>v.id===id);

  const CARD_TYPES = [
    {type:'weather_clock', icon:'🌤⏰', label:'Clima + Hora',       desc:'Previsão do tempo e relógio juntos'},
    {type:'clock_card',    icon:'⏰',   label:'Relógio',            desc:'Hora e data em tela cheia'},
    {type:'weather_card',  icon:'🌤',   label:'Previsão do Tempo',  desc:'Temperatura e condição atual'},
    {type:'slide',         icon:'🖼',   label:'Slide',              desc:'Título, texto, imagem e cores'},
  ];

  const mediaIcon=v=>{
    if(!v)return '?';
    const icons={'youtube':'▶','image':'🖼','pdf':'📄','video':'🎬','audio':'🎵','clock_card':'⏰','weather_card':'🌤','weather_clock':'🌤⏰','slide':'🖼'};
    return icons[v.media_type]||'🎬';
  };

  // Abrir modal para criar/editar um card
  const openCard=(type, existingVideo=null)=>{
    setCardForm(existingVideo?.config
      ? {...existingVideo.config, _name:existingVideo.original_name, _dur:existingVideo.display_duration||15, _rotation:existingVideo.rotation||0}
      : {_name:'', _dur:15, _rotation:0, bg_color:'#0f172a', text_color:'#ffffff'}
    );
    setCardModal({type, editing:existingVideo});
  };

  const saveCard=async()=>{
    setCardSaving(true);
    try{
      const {_name,_dur,_rotation,...config} = cardForm;
      const name     = _name || CARD_TYPES.find(c=>c.type===cardModal.type)?.label || cardModal.type;
      const dur      = parseInt(_dur)||15;
      const rotation = [0,90,180,270].includes(Number(_rotation)) ? Number(_rotation) : 0;

      let newVideo;
      if(cardModal.editing){
        const h={};if(TOKEN)h['Authorization']=`Bearer ${TOKEN}`;h['Content-Type']='application/json';
        const r=await fetch(`${API}/videos/card/${cardModal.editing.id}`,{method:'PUT',headers:h,body:JSON.stringify({name,config,display_duration:dur,rotation})});
        newVideo=await r.json();
      } else {
        const h={};if(TOKEN)h['Authorization']=`Bearer ${TOKEN}`;h['Content-Type']='application/json';
        const r=await fetch(`${API}/videos/card`,{method:'POST',headers:h,body:JSON.stringify({name,media_type:cardModal.type,config,display_duration:dur,rotation})});
        newVideo=await r.json();
        if(newVideo.id && !form.videoIds.includes(newVideo.id)){
          setForm(f=>({...f,videoIds:[...f.videoIds,newVideo.id]}));
        }
      }
      setCardModal(null);
      onUpdate();
      showToast('Card salvo!');

    setCardSaving(false);
  };

  // Filtrar por tipo no painel de disponíveis

  const cardMedia   = videos.filter(v=>['clock_card','weather_card','weather_clock','slide'].includes(v.media_type));

        </div>
        <div style={{display:'flex',gap:8}}>
          <button onClick={()=>{setPlSelectMode(m=>!m);if(plSelectMode)clearPlSel();}} style={{fontSize:12,fontWeight:600,padding:'8px 14px',borderRadius:8,border:`1px solid ${plSelectMode?'#0066FF':'#E2E8F0'}`,background:plSelectMode?'#EFF6FF':'#fff',color:plSelectMode?'#0066FF':'#64748B',cursor:'pointer',transition:'all .15s',display:'flex',alignItems:'center',gap:5}}>
            {plSelectMode?'✕ Cancelar':'☑ Selecionar'}
          </button>
          <button onClick={()=>open()} className="btn-primary">+ Nova Playlist</button>
        </div>
      </div>
      {/* Bulk action bar */}
      {plSelectMode&&(
        <div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',background:'#EFF6FF',border:'1px solid #BFDBFE',borderRadius:10,marginBottom:12}}>
          <span style={{fontSize:13,fontWeight:600,color:'#2563EB'}}>{plSelected.size} selecionada{plSelected.size!==1?'s':''}</span>
          <button onClick={()=>setPlSelected(new Set(playlists.map(p=>p.id)))} style={{fontSize:12,color:'#2563EB',background:'none',border:'none',cursor:'pointer',fontWeight:600,padding:'4px 8px',borderRadius:6}} onMouseEnter={e=>e.currentTarget.style.background='#DBEAFE'} onMouseLeave={e=>e.currentTarget.style.background='none'}>Selecionar todas ({playlists.length})</button>
          <div style={{flex:1}}/>
          <button onClick={bulkDeletePl} style={{fontSize:12,fontWeight:700,padding:'6px 14px',borderRadius:8,border:'1px solid #FECACA',background:'#FEF2F2',color:'#DC2626',cursor:'pointer'}} onMouseEnter={e=>e.currentTarget.style.background='#FEE2E2'} onMouseLeave={e=>e.currentTarget.style.background='#FEF2F2'}>🗑 Remover ({plSelected.size})</button>
          <button onClick={clearPlSel} style={{fontSize:12,padding:'6px 12px',borderRadius:8,border:'1px solid #E2E8F0',background:'#fff',color:'#64748B',cursor:'pointer'}}>✕ Cancelar</button>
        </div>

      <div className="grid grid-cols-1 md:grid-cols-2 gap-3">

// ── AGENDAMENTOS ─────────────────────────────────────────────────
function SchedulesPage({tvs,playlists,schedules,onUpdate,showToast}){
  const [modal,setModal]=useState(false);const [edit,setEdit]=useState(null);
  const [form,setForm]=useState({tv_id:'',playlist_id:'',name:'',start_time:'08:00',end_time:'18:00',days:[1,2,3,4,5]});
  const open=(s=null)=>{setEdit(s);setForm(s?{...s}:{tv_id:'',playlist_id:'',name:'',start_time:'08:00',end_time:'18:00',days:[1,2,3,4,5]});setModal(true);};
  const save=async()=>{if(!form.tv_id||!form.playlist_id)return;edit?await api.updateSchedule(edit.id,form):await api.createSchedule(form);setModal(false);onUpdate();showToast('Agendamento salvo!');};
  const del=async id=>{if(!confirm('Remover?'))return;await api.deleteSchedule(id);onUpdate();showToast('Removido');};
  const toggleDay=d=>setForm(f=>({...f,days:f.days.includes(d)?f.days.filter(x=>x!==d):[...f.days,d].sort()}));
  const toggleActive=async s=>{await api.updateSchedule(s.id,{active:s.active?0:1});onUpdate();};
  const getTv=id=>tvs.find(t=>t.id===id);const getPl=id=>playlists.find(p=>p.id===id);
  return (
    <div className="fadein" style={{padding:"24px",maxWidth:1200}}>
      <div className="flex items-center justify-between mb-5">
        <div><h2 className="text-xl md:text-2xl font-bold">Agendamentos</h2><p className="text-gray-500 text-sm">Playlists automáticas por horário e dia</p></div>
        <button onClick={()=>open()} className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium">+ Novo</button>
      </div>
      {schedules.length===0&&<div className="text-center py-16 text-gray-400"><div className="text-4xl mb-3">🕐</div><p className="mb-2">Nenhum agendamento</p><button onClick={()=>open()} className="mt-3 text-blue-500 text-sm">Criar primeiro</button></div>}
      <div className="space-y-3">
        {schedules.map(s=>{const tv=getTv(s.tv_id);const pl=getPl(s.playlist_id);return(
          <div key={s.id} className={`bg-white rounded-xl shadow-sm border p-4 fadein transition ${s.active?'border-blue-100':'border-gray-100 opacity-60'}`}>
            <div className="flex items-start justify-between gap-3">
              <div className="flex-1 min-w-0">
                <div className="flex items-center gap-2 mb-1">
                  <h3 className="font-semibold truncate">{s.name}</h3>
                  {s.active&&<span className="text-xs bg-green-100 text-green-700 px-1.5 py-0.5 rounded-full">ativo</span>}
                </div>
                <p className="text-sm text-gray-600">{tv?.name||s.tv_id} → <span className="font-medium">{pl?.name||s.playlist_id}</span></p>
                <p className="text-xs text-gray-400 mt-0.5">🕐 {s.start_time} – {s.end_time}</p>
              </div>
              <div className="flex flex-col items-end gap-1">
                <div className="flex flex-wrap gap-0.5 justify-end max-w-32">
                  {DAYS.map((d,i)=><span key={i} className={`text-xs px-1.5 py-0.5 rounded ${(s.days||[]).includes(i)?'bg-blue-100 text-blue-700':'bg-gray-100 text-gray-400'}`}>{d}</span>)}
                </div>
              </div>
            </div>
            <div className="flex gap-1.5 mt-3">
              <button onClick={()=>toggleActive(s)} className={`flex-1 text-xs py-1.5 rounded-lg border transition ${s.active?'border-yellow-200 text-yellow-600 hover:bg-yellow-50':'border-green-200 text-green-600 hover:bg-green-50'}`}>{s.active?'⏸ Pausar':'▶ Ativar'}</button>
              <button onClick={()=>open(s)} className="flex-1 text-xs border border-gray-200 hover:border-blue-300 hover:text-blue-600 py-1.5 rounded-lg transition">✏️ Editar</button>
              <button onClick={()=>del(s.id)} className="text-xs text-red-400 border border-gray-200 px-3 py-1.5 rounded-lg transition">🗑</button>
            </div>
          </div>
        );})}
      </div>
      {modal&&<Modal title={edit?'Editar Agendamento':'Novo Agendamento'} onClose={()=>setModal(false)} onSave={save}>
        <Lbl>Nome do agendamento</Lbl><Inp value={form.name} onChange={v=>setForm(f=>({...f,name:v}))} placeholder="Ex: Cardápio Almoço"/>
        <Lbl>TV</Lbl>
        <Sel value={form.tv_id} onChange={v=>setForm(f=>({...f,tv_id:v}))}>
          <option value="">— Selecione —</option>{tvs.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}
        </Sel>
        <Lbl>Playlist</Lbl>
        <Sel value={form.playlist_id} onChange={v=>setForm(f=>({...f,playlist_id:v}))}>
          <option value="">— Selecione —</option>{playlists.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
        </Sel>
        <div className="grid grid-cols-2 gap-2">
          <div><Lbl>Início</Lbl><input type="time" value={form.start_time} onChange={e=>setForm(f=>({...f,start_time:e.target.value}))} style={{width:"100%",padding:"9px 12px",marginBottom:12,borderRadius:8,border:"1px solid #CBD5E1",background:"#fff",color:"#1E293B",fontSize:13}}/></div>
          <div><Lbl>Fim</Lbl><input type="time" value={form.end_time} onChange={e=>setForm(f=>({...f,end_time:e.target.value}))} style={{width:"100%",padding:"9px 12px",marginBottom:12,borderRadius:8,border:"1px solid #CBD5E1",background:"#fff",color:"#1E293B",fontSize:13}}/></div>
        </div>
        <Lbl>Dias da semana</Lbl>
        <div className="flex gap-1.5 flex-wrap mb-3">
          {DAYS.map((d,i)=><button key={i} type="button" onClick={()=>toggleDay(i)} className={`px-2.5 py-1.5 rounded-lg text-xs font-medium transition ${form.days.includes(i)?'bg-blue-600 text-white':'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>{d}</button>)}
        </div>
      </Modal>}
    </div>
  );
}
