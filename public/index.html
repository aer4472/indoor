function WidgetPositionPicker({position,freeX=85,freeY=10,onChange}){
  const ref=useRef();const[dragging,setDragging]=useState(false);
  const[dp,setDp]=useState({x:freeX,y:freeY});
  useEffect(()=>{if(position==='free')setDp({x:freeX,y:freeY});},[position,freeX,freeY]);
  function pct(e){const r=ref.current.getBoundingClientRect();const cx=e.touches?e.touches[0].clientX:e.clientX,cy=e.touches?e.touches[0].clientY:e.clientY;return{x:Math.round(Math.max(2,Math.min(98,(cx-r.left)/r.width*100))),y:Math.round(Math.max(2,Math.min(98,(cy-r.top)/r.height*100)))}}
  function onStart(e){if(position!=='free')return;e.preventDefault();setDragging(true);const p=pct(e);setDp(p);onChange('free',p.x,p.y);}
  function onMove(e){if(!dragging)return;const p=pct(e);setDp(p);onChange('free',p.x,p.y);}
  function onEnd(){setDragging(false);}
  const marker=position==='free'?dp:(SNAP_POINTS.find(s=>s.pos===position)||{x:50,y:50});
  return (
    <div className="mb-3">
      <Lbl>Posição na tela</Lbl>
      <div ref={ref} onMouseDown={onStart} onMouseMove={onMove} onMouseUp={onEnd} onMouseLeave={onEnd}
        onTouchStart={onStart} onTouchMove={onMove} onTouchEnd={onEnd}
        className="relative rounded-lg overflow-hidden mb-3 select-none"
        style={{background:'#111',aspectRatio:'16/9',width:'100%',cursor:position==='free'?(dragging?'grabbing':'crosshair'):'default',border:'2px solid #e5e7eb'}}>
        <div style={{position:'absolute',inset:0,backgroundImage:'linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px)',backgroundSize:'25% 25%'}}/>
        <div style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',color:'rgba(255,255,255,.1)',fontSize:'10px',fontWeight:600,letterSpacing:2,pointerEvents:'none'}}>TELA 16:9</div>
        <div style={{position:'absolute',top:0,left:0,right:0,height:'6%',background:position==='top'?'rgba(59,130,246,.6)':'rgba(255,255,255,.07)',pointerEvents:'none'}}/>
        <div style={{position:'absolute',bottom:0,left:0,right:0,height:'6%',background:position==='bottom'?'rgba(59,130,246,.6)':'rgba(255,255,255,.07)',pointerEvents:'none'}}/>
        <div style={{position:'absolute',top:0,bottom:0,left:0,width:'5%',background:position==='side-left'?'rgba(59,130,246,.6)':'rgba(255,255,255,.07)',pointerEvents:'none'}}/>
        <div style={{position:'absolute',top:0,bottom:0,right:0,width:'5%',background:position==='side-right'?'rgba(59,130,246,.6)':'rgba(255,255,255,.07)',pointerEvents:'none'}}/>
        <div style={{position:'absolute',left:marker.x+'%',top:marker.y+'%',transform:'translate(-50%,-50%)',width:26,height:26,background:'#3b82f6',borderRadius:7,border:'2px solid #fff',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:11,fontWeight:700,boxShadow:'0 2px 8px rgba(0,0,0,.5)',pointerEvents:'none',zIndex:10,transition:dragging?'none':'left .12s,top .12s'}}>W</div>
        {position==='free'&&<div style={{position:'absolute',bottom:'8%',left:'50%',transform:'translateX(-50%)',background:'rgba(0,0,0,.6)',color:'rgba(255,255,255,.7)',fontSize:10,padding:'2px 8px',borderRadius:20,pointerEvents:'none',whiteSpace:'nowrap'}}>{dragging?'📍 Posicionando...':'Clique ou arraste'}</div>}
      </div>
      <div className="grid grid-cols-3 gap-1.5 mb-1">
        {SNAP_POINTS.map(s=>(
          <button key={s.id} type="button" onClick={()=>onChange(s.pos,s.x,s.y)}
            className={`flex items-center gap-2 px-3 py-2 rounded-lg text-xs font-medium border transition ${position===s.pos?'bg-blue-500 text-white border-blue-500':'bg-gray-50 text-gray-700 border-gray-200 hover:bg-gray-100'}`}>
            <span>{s.icon}</span>{s.label}
          </button>
        ))}
        <button type="button" onClick={()=>onChange('free',dp.x,dp.y)}
          className={`col-span-2 flex items-center justify-center gap-2 px-3 py-2 rounded-lg text-xs font-medium border transition ${position==='free'?'bg-blue-500 text-white border-blue-500':'bg-gray-50 text-gray-700 border-gray-200 hover:bg-gray-100'}`}>
          📍 Posição livre{position==='free'&&<span className="opacity-70 font-normal">({dp.x}%, {dp.y}%)</span>}
        </button>
      </div>
    </div>
  );
}

// Componente separado para evitar hooks condicionais em WidgetConfigFields
function LogoWidgetConfig({config, onChange}) {
  const set=(k,v)=>onChange({...config,[k]:v});
  const fileRef = useRef();
  const [uploading, setUploading] = useState(false);

  const uploadFile = async (file) => {
    if (!file) return;
    setUploading(true);
    try {
      const r = await api.uploadLogo(file, 'sponsor');
      if (r.url) {
        // Um único onChange para evitar sobrescrita (set sequencial usa config stale)
        onChange({ ...config, url: r.url, _filename: r.filename });
      } else if (r.error) alert(r.error);
    } catch(e) { alert('Erro no upload: ' + e.message); }
    setUploading(false);
  };

  return (<>
    <Lbl>Logo (PNG, JPG, GIF, WebP)</Lbl>
    <div
      onClick={()=>fileRef.current?.click()}
      className={`border-2 border-dashed rounded-xl p-4 text-center cursor-pointer transition mb-3 ${config.url?'border-green-300 bg-green-50':'border-gray-200 hover:border-blue-300'}`}>
      {uploading
        ? <p className="text-sm text-blue-600">⏳ Enviando...</p>
        : config.url
          ? <div>
              <img src={config.url} alt="Logo" className="mx-auto mb-2" style={{maxHeight:64,maxWidth:'100%',objectFit:'contain'}} onError={e=>e.target.style.display='none'}/>
              <p className="text-xs text-green-600 font-medium">✅ Logo carregada — clique para trocar</p>
            </div>
          : <div><div className="text-2xl mb-1">🖼</div><p className="text-sm text-gray-500">Clique para enviar PNG, JPG ou GIF</p><p className="text-xs text-gray-400 mt-0.5">Máx. 10 MB</p></div>
      }
    </div>
    <input ref={fileRef} type="file" accept="image/png,image/jpeg,image/jpg,image/gif,image/webp" className="hidden"
      onChange={e=>uploadFile(e.target.files?.[0])}/>
    <Lbl>Ou cole uma URL diretamente</Lbl>
    <Inp value={config.url||''} onChange={v=>set('url',v)} placeholder="https://... ou /storage/logos/..."/>
    <div className="grid grid-cols-2 gap-2">
      <div>
        <Lbl>Largura (px)</Lbl>
        <input type="number" value={config.width||120} onChange={e=>set('width',+e.target.value)} min="40" max="600"
          className="w-full border border-gray-200 rounded-lg px-3 py-2 mb-3 text-sm"/>
      </div>
      <div>
        <Lbl>Opacidade: {Math.round((config.opacity??1)*100)}%</Lbl>
        <input type="range" min="10" max="100" value={Math.round((config.opacity??1)*100)}
          onChange={e=>set('opacity',+e.target.value/100)} className="w-full mt-3"/>
      </div>
    </div>
    <div className="flex items-center gap-3 mb-3">
      <input type="checkbox" id="transp" checked={!!config.transparent} onChange={e=>set('transparent',e.target.checked)}/>
      <label htmlFor="transp" className="text-sm text-gray-700">Fundo transparente</label>
      {!config.transparent && <input type="color" value={config.bg_color||'#000000'} onChange={e=>set('bg_color',e.target.value)} className="w-8 h-8 rounded border border-gray-200 cursor-pointer"/>}
    </div>
    <Lbl>Tamanho do widget</Lbl>
    <Sel value={config.widget_size||'md'} onChange={v=>set('widget_size',v)}>{WIDGET_SIZES.map(s=><option key={s.value} value={s.value}>{s.label}</option>)}</Sel>
  </>);
}

function WidgetConfigFields({type,config,onChange}){
  const set=(k,v)=>onChange({...config,[k]:v});
  const [geoPreview,setGeoPreview]=useState(null);const [geoLoading,setGeoLoading]=useState(false);
  const [testResult,setTestResult]=useState(null);const [testing,setTesting]=useState(false);
  const searchCity=async()=>{
    if(!(config.city||'').trim())return;setGeoLoading(true);
    try{const r=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(config.city)}&count=10&language=pt&format=json`);const j=await r.json();let rs=j.results||[];const br=rs.filter(r=>r.country_code==='BR');let fl=br.length>0?br:rs;if(config.state&&br.length>1){const st=config.state.toUpperCase().trim();const bs=br.filter(r=>(r.admin1||'').toUpperCase().includes(ESTADO_SIGLAS[st]||st));if(bs.length)fl=bs;}setGeoPreview(fl.slice(0,5));}catch{setGeoPreview([]);}
    setGeoLoading(false);
  };
  const testUrl=async()=>{if(!config.rss_url)return;setTesting(true);setTestResult(null);try{const r=await fetch(`/api/proxy/news?url=${encodeURIComponent(config.rss_url)}`);const j=await r.json();setTestResult(j);}catch(e){setTestResult({error:e.message,items:[]});}setTesting(false);};

  if(type==='weather') return (<>
    <div className="grid grid-cols-2 gap-2 mb-1">
      <div><Lbl>Cidade</Lbl><Inp value={config.city||''} onChange={v=>set('city',v)} placeholder="Ex: Bragança"/></div>
      <div><Lbl>Estado</Lbl><Inp value={config.state||''} onChange={v=>set('state',v)} placeholder="Ex: PA"/></div>
    </div>
    <button type="button" onClick={searchCity} disabled={geoLoading} className="w-full text-xs bg-gray-100 hover:bg-gray-200 text-gray-700 py-1.5 rounded-lg mb-3 transition disabled:opacity-50">{geoLoading?'Buscando...':'🔍 Verificar cidade'}</button>
    {geoPreview!==null&&(geoPreview.length===0?<p className="text-xs text-red-500 mb-3">Cidade não encontrada.</p>:
      <div className="mb-3 space-y-1">{geoPreview.map((r,i)=>(
        <div key={i} onClick={()=>{set('city',r.name);set('state',r.admin1||'');set('_lat',r.latitude);set('_lon',r.longitude);setGeoPreview(null);}} className="flex items-center justify-between bg-green-50 border border-green-200 rounded-lg px-3 py-2 cursor-pointer hover:bg-green-100">
          <div><p className="text-xs font-medium text-green-800">{r.name}{r.admin1?`, ${r.admin1}`:''}</p><p className="text-xs text-green-600">{r.latitude.toFixed(4)}, {r.longitude.toFixed(4)}</p></div>
          <span className="text-green-500">✓</span>
        </div>
      ))}</div>
    )}
    <div className="grid grid-cols-2 gap-2">
      <div><Lbl>Temperatura</Lbl><Sel value={config.unit||'C'} onChange={v=>set('unit',v)}><option value="C">°C</option><option value="F">°F</option></Sel></div>
      <div><Lbl>Tamanho</Lbl><Sel value={config.widget_size||'md'} onChange={v=>set('widget_size',v)}>{WIDGET_SIZES.map(s=><option key={s.value} value={s.value}>{s.label}</option>)}</Sel></div>
    </div>
  </>);

  if(type==='news') return (<>
    <Lbl>URL do site ou feed RSS</Lbl>
    <div className="flex gap-2 mb-2">
      <input value={config.rss_url||''} onChange={e=>set('rss_url',e.target.value)} placeholder="https://g1.globo.com/rss/g1/saude/" className="flex-1 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-400"/>
      <button type="button" onClick={testUrl} disabled={testing||!config.rss_url} className="px-3 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg text-xs font-medium transition disabled:opacity-40 whitespace-nowrap">{testing?'⏳':'🔍 Testar'}</button>
    </div>
    {testResult&&(testResult.items?.length>0
      ?<div className="bg-green-50 border border-green-200 rounded-lg p-3 mb-3"><p className="text-xs font-semibold text-green-700 mb-1">✅ {testResult.items.length} notícias via {testResult.source}</p>{testResult.items.slice(0,4).map((n,i)=><p key={i} className="text-xs text-green-800 truncate">• {n}</p>)}</div>
      :<div className="bg-red-50 border border-red-200 rounded-lg p-3 mb-3"><p className="text-xs font-semibold text-red-700">❌ Nenhuma notícia</p>{(testResult.hint||testResult.error)&&<p className="text-xs text-red-600 mt-1">{testResult.hint||testResult.error}</p>}</div>
    )}
    <div className="grid grid-cols-3 gap-2 mb-2">
      <div><Lbl>Qtde</Lbl><input type="number" value={config.count||10} onChange={e=>set('count',Math.min(20,Math.max(1,+e.target.value)))} min="1" max="20" className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm text-center"/></div>
      <div><Lbl>Velocidade</Lbl><input type="number" value={config.speed||60} onChange={e=>set('speed',+e.target.value)} min="20" max="200" className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm"/></div>
      <div><Lbl>Tamanho</Lbl><Sel value={config.widget_size||'md'} onChange={v=>set('widget_size',v)}>{WIDGET_SIZES.map(s=><option key={s.value} value={s.value}>{s.label}</option>)}</Sel></div>
    </div>
    <div className="bg-blue-50 rounded-lg p-2.5 text-xs text-blue-700">
      <p className="font-semibold mb-1">📡 Feeds RSS sugeridos:</p>
      {[['G1 Saúde','https://g1.globo.com/rss/g1/saude/'],['G1 Brasil','https://g1.globo.com/rss/g1/brasil/'],['BBC Brasil','https://www.bbc.com/portuguese/index.xml'],['UOL Notícias','https://rss.uol.com.br/feed/noticias.xml']].map(([l,u])=>(<p key={u} className="cursor-pointer hover:text-blue-900 truncate" onClick={()=>set('rss_url',u)}>➤ {l}</p>))}
    </div>
  </>);

  if(type==='clock') return (<>
    <div className="grid grid-cols-2 gap-2">
      <div><Lbl>Formato</Lbl><Sel value={config.format||'24h'} onChange={v=>set('format',v)}><option value="24h">24h</option><option value="12h">12h AM/PM</option></Sel></div>
      <div><Lbl>Tamanho</Lbl><Sel value={config.widget_size||'md'} onChange={v=>set('widget_size',v)}>{WIDGET_SIZES.map(s=><option key={s.value} value={s.value}>{s.label}</option>)}</Sel></div>
    </div>
    <div className="flex items-center gap-2 mb-3"><input type="checkbox" checked={config.showDate!==false} onChange={e=>set('showDate',e.target.checked)} id="showDate"/><label htmlFor="showDate" className="text-sm text-gray-700">Mostrar data</label></div>
  </>);

  if(type==='text') return (<>
    <Lbl>Mensagem</Lbl>
    <textarea value={config.text||''} onChange={e=>set('text',e.target.value)} placeholder="Ex: Bem-vindo!" rows={3} className="w-full border border-gray-200 rounded-lg px-3 py-2 mb-3 text-sm focus:outline-none focus:border-blue-400 resize-none"/>
    <div className="grid grid-cols-2 gap-2">
      <div><Lbl>Cor do texto</Lbl><input type="color" value={config.color||'#ffffff'} onChange={e=>set('color',e.target.value)} className="w-full h-10 rounded-lg border border-gray-200 cursor-pointer mb-3"/></div>
      <div><Lbl>Tamanho</Lbl><Sel value={config.widget_size||'md'} onChange={v=>set('widget_size',v)}>{WIDGET_SIZES.map(s=><option key={s.value} value={s.value}>{s.label}</option>)}</Sel></div>
    </div>
  </>);

  if(type==='countdown') return (<>
    <Lbl>Rótulo do evento</Lbl><Inp value={config.label||''} onChange={v=>set('label',v)} placeholder="Ex: Formatura 2025"/>
    <Lbl>Data/hora do evento</Lbl><input type="datetime-local" value={config.target_date||''} onChange={e=>set('target_date',e.target.value)} className="w-full border border-gray-200 rounded-lg px-3 py-2 mb-3 text-sm"/>
    <div className="grid grid-cols-2 gap-2">
      <div><Lbl>Cor</Lbl><input type="color" value={config.color||'#ffffff'} onChange={e=>set('color',e.target.value)} className="w-full h-10 rounded-lg border border-gray-200 cursor-pointer mb-3"/></div>
      <div><Lbl>Tamanho</Lbl><Sel value={config.widget_size||'md'} onChange={v=>set('widget_size',v)}>{WIDGET_SIZES.map(s=><option key={s.value} value={s.value}>{s.label}</option>)}</Sel></div>
    </div>
  </>);

  if(type==='menu') {
    const items=config.items||[{name:'',price:''}];
    const setItems=its=>set('items',its);
    const addItem=()=>setItems([...items,{name:'',price:''}]);
    const rmItem=i=>setItems(items.filter((_,j)=>j!==i));
    const setItem=(i,k,v)=>setItems(items.map((it,j)=>j===i?{...it,[k]:v}:it));
    return (<>
      <Lbl>Título do cardápio</Lbl><Inp value={config.title||''} onChange={v=>set('title',v)} placeholder="Ex: Cardápio do Dia"/>

        {items.map((it,i)=>(
          <div key={i} className="flex gap-2 items-center">
            <input value={it.name} onChange={e=>setItem(i,'name',e.target.value)} placeholder="Nome do prato" className="flex-1 border border-gray-200 rounded-lg px-2.5 py-2 text-sm focus:outline-none focus:border-blue-400"/>
            <input value={it.price} onChange={e=>setItem(i,'price',e.target.value)} placeholder="R$ 0,00" className="w-24 border border-gray-200 rounded-lg px-2.5 py-2 text-sm focus:outline-none focus:border-blue-400"/>

      </div>
    </>);
  }

  if(type==='qrcode') return (<>
    <Lbl>URL do QR Code</Lbl><Inp value={config.url||''} onChange={v=>set('url',v)} placeholder="https://exemplo.com"/>

  </>);

  if(type==='iframe') return (<>
    <Lbl>URL</Lbl><Inp value={config.url||''} onChange={v=>set('url',v)} placeholder="https://..."/>
    <div className="bg-yellow-50 border border-yellow-200 rounded-lg p-2.5 text-xs text-yellow-800">⚠️ Nem todos os sites permitem incorporação. Se aparecer em branco, o site bloqueou o iframe.</div>
  </>);



  return null;
}

function WidgetsPage({widgets,tvs,onUpdate,showToast}){
  const [modal,setModal]=useState(false);const [edit,setEdit]=useState(null);
  const [form,setForm]=useState({name:'',type:'clock',config:{},position:'corner-tr',active:1,tv_ids:[],rotation:0});
  const open=(w=null)=>{
    setEdit(w);
    setForm(w
      ? {name:w.name,type:w.type,config:{...w.config},position:w.position,active:w.active,
         tv_ids:w.tv_ids?w.tv_ids.split(',').filter(Boolean):[],
         rotation:w.rotation||0}
      : {name:'',type:'clock',config:{},position:'corner-tr',active:1,tv_ids:[],rotation:0});
    setModal(true);
  };
  const save=async()=>{
    if(!form.name.trim())return;
    const d={...form,tv_ids:form.tv_ids.join(',')};
    edit?await api.updateWidget(edit.id,d):await api.createWidget(d);
    setModal(false);onUpdate();showToast(edit?'Widget atualizado!':'Widget criado!');
  };
  const del=async id=>{if(!confirm('Remover widget?'))return;await api.deleteWidget(id);onUpdate();showToast('Removido');};
  const toggleActive=async w=>{await api.updateWidget(w.id,{active:w.active?0:1});onUpdate();};
  const posLabel=p=>WIDGET_POSITIONS.find(x=>x.value===p)?.label||p;
  const typeLabel=t=>WIDGET_TYPES.find(x=>x.value===t)?.label||t;
  const toggleTv=id=>setForm(f=>({...f,tv_ids:f.tv_ids.includes(id)?f.tv_ids.filter(x=>x!==id):[...f.tv_ids,id]}));

  return (
    <div className="fadein" style={{padding:"24px",maxWidth:1200}}>
      <div className="flex items-center justify-between mb-5">
        <div><h2 className="text-xl md:text-2xl font-bold">Widgets</h2><p className="text-gray-500 text-sm">Sobreposições sobre o conteúdo</p></div>
        <button onClick={()=>open()} className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium">+ Novo</button>
      </div>
      <div className="space-y-2">
        {widgets.map(w=>{
          const tvNames=(w.tv_ids||'').split(',').filter(Boolean).map(id=>(tvs||[]).find(t=>t.id===id)?.name||id);
          return(
          <div key={w.id} className={`bg-white rounded-xl border p-3 fadein flex items-center gap-3 ${w.active?'border-gray-100 shadow-sm':'border-gray-100 opacity-50'}`}>
            <span className="text-xl">{WIDGET_TYPES.find(t=>t.value===w.type)?.label.split(' ')[0]||'🧩'}</span>
            <div className="flex-1 min-w-0">
              <p className="font-medium text-sm truncate">{w.name}</p>
              <div className="flex flex-wrap gap-1 mt-0.5">
                <span className="text-xs text-gray-400">{typeLabel(w.type)} · {posLabel(w.position)}</span>
                {(w.rotation||0)!==0&&<span className="text-xs bg-amber-100 text-amber-700 border border-amber-200 px-1.5 py-0.5 rounded-full font-semibold">↻{w.rotation}°</span>}
                {tvNames.length>0
                  ? tvNames.map(n=><span key={n} className="text-xs bg-blue-50 text-blue-700 border border-blue-200 px-1.5 py-0.5 rounded-full">{n}</span>)
                  : <span className="text-xs text-gray-300">Todas as TVs</span>}
              </div>
            </div>
            <div className="flex gap-1.5 flex-shrink-0">
              <button onClick={()=>toggleActive(w)} className={`text-xs px-2 py-1 rounded-lg border transition ${w.active?'border-yellow-200 text-yellow-600':'border-green-200 text-green-600'}`}>{w.active?'⏸':'▶'}</button>
              <button onClick={()=>open(w)} className="text-xs border border-gray-200 px-2 py-1 rounded-lg hover:border-blue-300 hover:text-blue-600 transition">✏️</button>
              <button onClick={()=>del(w.id)} className="text-xs text-red-400 border border-gray-200 px-2 py-1 rounded-lg transition">🗑</button>
            </div>
          </div>
        );})}
        {widgets.length===0&&<div className="text-center py-16 text-gray-400"><div className="text-4xl mb-3">🧩</div><p>Nenhum widget criado</p><button onClick={()=>open()} className="mt-2 text-blue-500 text-sm">Criar primeiro</button></div>}
      </div>
      {modal&&<Modal title={edit?'Editar Widget':'Novo Widget'} onClose={()=>setModal(false)} onSave={save} wide>
        <Lbl>Nome</Lbl><Inp value={form.name} onChange={v=>setForm(f=>({...f,name:v}))} placeholder="Ex: Clima Bragança"/>
        <Lbl>Tipo</Lbl>
        <Sel value={form.type} onChange={v=>setForm(f=>({...f,type:v,config:{}}))}>
          {WIDGET_TYPES.map(t=><option key={t.value} value={t.value}>{t.label} — {t.desc}</option>)}
        </Sel>
        <WidgetConfigFields type={form.type} config={form.config} onChange={c=>setForm(f=>({...f,config:c}))}/>
        <WidgetPositionPicker
          position={form.position}
          freeX={form.config._x||85}
          freeY={form.config._y||10}
          onChange={(pos,x,y)=>setForm(f=>({...f,position:pos,config:pos==='free'?{...f.config,_x:x,_y:y}:f.config}))}
        />
        <div className="mt-4 pt-4 border-t border-gray-100">
          <Lbl>TVs que exibem este widget</Lbl>
          <p className="text-xs text-gray-400 mb-2">Sem seleção = aparece em <strong>todas</strong> as TVs.</p>
          {(tvs||[]).length===0
            ? <p className="text-xs text-gray-400">Nenhuma TV cadastrada.</p>
            : <div className="flex flex-wrap gap-2">
                {(tvs||[]).map(tv=>(
                  <button key={tv.id} type="button" onClick={()=>toggleTv(tv.id)}
                    className={`px-3 py-1.5 rounded-xl border-2 text-xs font-medium transition ${form.tv_ids.includes(tv.id)?'border-blue-500 bg-blue-50 text-blue-700':'border-gray-200 bg-white text-gray-500 hover:border-blue-300'}`}>
                    📺 {tv.name}
                  </button>
                ))}
              </div>
          }
        </div>
        <div className="mt-4 pt-4 border-t border-gray-100">
          <Lbl>Rotação do widget</Lbl>
          <p className="text-xs text-gray-400 mb-2">Gira o widget na tela — útil para TVs em retrato.</p>

}

const SP_POSITIONS=[
  {v:'tl',l:'↖ Superior Esq.'},{v:'tc',l:'⬆ Superior Centro'},{v:'tr',l:'↗ Superior Dir.'},
  {v:'bl',l:'↙ Inferior Esq.'},{v:'bc',l:'⬇ Inferior Centro'},{v:'br',l:'↘ Inferior Dir.'},
  {v:'center',l:'⊙ Centro'},
];
const SP_ROTATIONS=[{v:0,l:'0°'},{v:90,l:'90°'},{v:180,l:'180°'},{v:270,l:'270°'}];

function SponsorGroup({group, onUpdate, showToast}){
  const [open,setOpen]=useState(false);
  const [uploading,setUploading]=useState(false);
  const [saving,setSaving]=useState(false);
  const [dragIdx,setDragIdx]=useState(null);
  const fileRef=useRef();
  const [cfg,setCfg]=useState({...group.config});
  const [meta,setMeta]=useState({name:group.name,position:group.position,active:group.active,rotation:group.rotation||0});
  const set=(k,v)=>setCfg(f=>({...f,[k]:v}));
  const setM=(k,v)=>setMeta(f=>({...f,[k]:v}));

  const save=async()=>{
    setSaving(true);
    await api.updateSponsorGroup(group.id,{...meta,config:cfg});
    setSaving(false);onUpdate();showToast('✅ Grupo salvo!');
  };
  const toggle=async()=>{
    await api.updateSponsorGroup(group.id,{active:!group.active});
    onUpdate();
  };
  const del=async()=>{
    if(!confirm(`Remover grupo "${group.name}" e todos os seus logos?`))return;
    await api.deleteSponsorGroup(group.id);onUpdate();showToast('Removido');
  };
  const uploadLogos=async files=>{
    if(!files?.length)return;setUploading(true);
    for(const f of Array.from(files)){
      const r=await api.uploadSponsorLogo(group.id,f);
      if(r.error)showToast(r.error,'error');
    }
    setUploading(false);onUpdate();showToast(files.length+' logo(s) adicionado(s)!');
  };
  const delLogo=async lid=>{
    await api.deleteSponsorLogo(group.id,lid);onUpdate();
  };
  const dropLogo=async toIdx=>{
    if(dragIdx===null||dragIdx===toIdx)return;
    const ids=[...group.logos.map(l=>l.id)];
    const[item]=ids.splice(dragIdx,1);ids.splice(toIdx,0,item);
    await api.reorderSponsorLogos(group.id,ids);onUpdate();setDragIdx(null);
  };

  const posLabel=SP_POSITIONS.find(p=>p.v===group.position)?.l||group.position;

  return(
    <div className={`bg-white rounded-2xl border shadow-sm overflow-hidden fadein ${!group.active?'opacity-60':''}`}>
      {/* Header */}
      <div className="flex items-center gap-3 px-4 py-3">
        <button onClick={toggle} className={`relative inline-flex h-5 w-9 items-center rounded-full transition-colors flex-shrink-0 ${group.active?'bg-green-500':'bg-gray-300'}`}>
          <span className={`inline-block h-3.5 w-3.5 transform rounded-full bg-white shadow transition-transform ${group.active?'translate-x-4':'translate-x-0.5'}`}/>
        </button>
        <div className="flex-1 min-w-0">
          <p className="font-semibold text-sm truncate">{group.name}</p>
          <p className="text-xs text-gray-400">{posLabel} · {group.logos?.length||0} logos · {group.config?.interval||5}s{group.rotation?` · ↻${group.rotation}°`:''}</p>
        </div>
        <div className="flex items-center gap-1.5 flex-shrink-0">
          <button onClick={()=>setOpen(o=>!o)} className="text-xs border border-gray-200 hover:border-blue-300 hover:text-blue-600 px-2.5 py-1.5 rounded-lg transition">
            {open?'▲ Fechar':'✏️ Editar'}
          </button>
          <button onClick={del} className="text-xs text-red-400 border border-gray-200 hover:border-red-300 px-2.5 py-1.5 rounded-lg transition">🗑</button>
        </div>
      </div>

      {/* Preview mini dos logos */}
      {(group.logos||[]).length>0&&!open&&(
        <div className="px-4 pb-3 flex gap-2 overflow-x-auto">
          {group.logos.map(l=>(
            <div key={l.id} className="w-14 h-10 bg-gray-50 rounded-lg border border-gray-100 flex items-center justify-center flex-shrink-0 overflow-hidden">
              <img src={l.url} alt={l.name} className="max-w-full max-h-full object-contain" style={{transform:group.rotation?`rotate(${group.rotation}deg)`:''}}/>
            </div>
          ))}
        </div>
      )}

      {/* Painel de edição */}
      {open&&<div className="border-t border-gray-100 p-4 space-y-4 bg-gray-50">
        {/* Nome e posição */}
        <div className="grid grid-cols-2 gap-3">
          <div>
            <label className="block text-xs font-medium text-gray-600 mb-1">Nome</label>
            <input value={meta.name} onChange={e=>setM('name',e.target.value)} className="w-full border border-gray-200 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:border-blue-400 bg-white"/>
          </div>
          <div>
            <label className="block text-xs font-medium text-gray-600 mb-1">Rotação das imagens</label>
            <div className="flex gap-1">
              {SP_ROTATIONS.map(r=>(
                <button key={r.v} onClick={()=>setM('rotation',r.v)} className={`flex-1 py-1.5 rounded-lg text-xs border transition ${meta.rotation===r.v?'bg-blue-600 text-white border-blue-600':'bg-white border-gray-200 hover:border-blue-300'}`}>{r.l}</button>
              ))}
            </div>
          </div>
        </div>

        {/* Posição na tela */}
        <div>
          <label className="block text-xs font-medium text-gray-600 mb-1.5">Posição na tela</label>
          <div className="grid grid-cols-3 gap-1.5">
            {SP_POSITIONS.map(p=>(
              <button key={p.v} onClick={()=>setM('position',p.v)} className={`py-1.5 px-1 rounded-lg text-xs border transition ${meta.position===p.v?'bg-blue-600 text-white border-blue-600':'bg-white border-gray-200 hover:border-blue-300'}`}>{p.l}</button>
            ))}
          </div>
        </div>

        {/* Dimensões e intervalo */}
        <div className="grid grid-cols-3 gap-3">
          <div>
            <label className="block text-xs font-medium text-gray-600 mb-1">Largura (px)</label>

          </div>
          <div>
            <label className="block text-xs font-medium text-gray-600 mb-1">Intervalo (s)</label>
            <input type="number" value={cfg.interval||5} min="1" max="60" onChange={e=>set('interval',+e.target.value)} className="w-full border border-gray-200 rounded-lg px-3 py-1.5 text-sm bg-white focus:outline-none focus:border-blue-400"/>
          </div>
        </div>

        {/* Opacidade e visual */}
        <div className="grid grid-cols-3 gap-3">
          <div className="col-span-2">
            <label className="block text-xs font-medium text-gray-600 mb-1">Opacidade: {Math.round((cfg.opacity??0.9)*100)}%</label>
            <input type="range" min="10" max="100" value={Math.round((cfg.opacity??0.9)*100)} onChange={e=>set('opacity',+e.target.value/100)} className="w-full mt-1"/>
          </div>
          <div>
            <label className="block text-xs font-medium text-gray-600 mb-1">Arredondamento</label>
            <input type="number" value={cfg.radius??8} min="0" max="40" onChange={e=>set('radius',+e.target.value)} className="w-full border border-gray-200 rounded-lg px-3 py-1.5 text-sm bg-white focus:outline-none focus:border-blue-400"/>
          </div>
        </div>
        <div>
          <label className="block text-xs font-medium text-gray-600 mb-1">Fundo</label>
          <div className="flex gap-2 items-center">
            <button onClick={()=>set('bg','transparent')} className={"px-2.5 py-1.5 rounded-lg text-xs border transition flex-shrink-0 "+(cfg.bg==='transparent'?'bg-gray-800 text-white border-gray-800':'bg-white border-gray-200 hover:border-gray-400 text-gray-600')}>
              Transparente
            </button>
            <input type="color" value={'#000000'} onChange={e=>set('bg',e.target.value+'cc')} className="w-9 h-9 rounded border border-gray-200 cursor-pointer flex-shrink-0" title="Escolher cor"/>

        </div>

        <button onClick={save} disabled={saving} className="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-xl text-sm font-semibold transition disabled:opacity-50">
          {saving?'Salvando...':'💾 Salvar configurações'}
        </button>

        {/* Logos do grupo */}
        <div className="border-t border-gray-200 pt-4">
          <div className="flex items-center justify-between mb-3">
            <p className="text-sm font-semibold text-gray-700">Logos ({(group.logos||[]).length})</p>
            <button onClick={()=>fileRef.current?.click()} disabled={uploading} className="text-xs bg-green-600 hover:bg-green-700 text-white px-3 py-1.5 rounded-lg transition disabled:opacity-50">
              {uploading?'⏳ Enviando...':'+ Adicionar logos'}

          {(group.logos||[]).length>0?(
            <div className="grid grid-cols-3 gap-2">
              {group.logos.map((l,i)=>(
                <div key={l.id} draggable onDragStart={()=>setDragIdx(i)} onDragOver={e=>e.preventDefault()} onDrop={()=>dropLogo(i)}
                  className={`bg-white rounded-xl border shadow-sm overflow-hidden group cursor-grab ${dragIdx===i?'opacity-40 border-blue-400':'border-gray-100'}`}>
                  <div className="h-16 bg-gray-50 flex items-center justify-center p-2 overflow-hidden">
                    <img src={l.url} alt={l.name} className="max-w-full max-h-full object-contain"
                      style={{transform:meta.rotation?`rotate(${meta.rotation}deg)`:''}}/>

                    <span className="text-xs text-gray-500 truncate">{l.name}</span>
                    <button onClick={()=>delLogo(l.id)} className="text-red-400 hover:text-red-600 ml-1 opacity-0 group-hover:opacity-100 transition text-xs">✕</button>

    </div>
  );

function EmergencyPage({emergency,onUpdate,showToast}){
  const [form,setForm]=useState({title:emergency?.title||'AVISO IMPORTANTE',message:emergency?.message||'',bg_color:emergency?.bg_color||'#dc2626',text_color:emergency?.text_color||'#ffffff'});
  const [loading,setLoading]=useState(false);
  useEffect(()=>{setForm({title:emergency?.title||'AVISO IMPORTANTE',message:emergency?.message||'',bg_color:emergency?.bg_color||'#dc2626',text_color:emergency?.text_color||'#ffffff'});},[emergency]);
  const isActive=emergency?.active===1;
  const toggle=async()=>{
    setLoading(true);
    await api.setEmergency({...form,active:isActive?0:1});
    onUpdate();
    setLoading(false);
    showToast(isActive?'Emergência desativada':'🚨 Emergência ativada em todas as TVs!',isActive?'success':'error');
    // Tocar sirene de aviso no painel ao ativar
    if (!isActive) {
      try {
        const ctx = new (window.AudioContext||window.webkitAudioContext)();
        const osc = ctx.createOscillator(); const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type='sawtooth'; gain.gain.setValueAtTime(0.18,ctx.currentTime);
        osc.frequency.setValueAtTime(400,ctx.currentTime);
        osc.frequency.linearRampToValueAtTime(800,ctx.currentTime+0.4);
        osc.frequency.linearRampToValueAtTime(400,ctx.currentTime+0.8);
        osc.frequency.linearRampToValueAtTime(800,ctx.currentTime+1.2);
        gain.gain.linearRampToValueAtTime(0,ctx.currentTime+1.4);
        osc.start(ctx.currentTime); osc.stop(ctx.currentTime+1.5);
        setTimeout(()=>ctx.close(),2000);
      } catch {}
    }
  };
  const save=async()=>{await api.setEmergency({...form,active:isActive?1:0});onUpdate();showToast('Configurações salvas!');};
  return (
    <div className="p-4 md:p-6 fadein max-w-xl">
      <h2 className="text-xl md:text-2xl font-bold mb-1">Tela de Emergência</h2>
      <p className="text-gray-500 text-sm mb-5">Interrompe todas as TVs instantaneamente</p>
      {isActive&&<div className="bg-red-50 border border-red-300 rounded-xl p-3 mb-4 flex items-center gap-2 text-red-700"><span className="text-xl">🚨</span><span className="font-semibold text-sm">Emergência ATIVA em todas as TVs</span></div>}
      <div className="rounded-xl overflow-hidden mb-5 shadow">
        <div className="relative flex flex-col items-center justify-center" style={{background:form.bg_color,padding:'28px 24px',minHeight:'120px',textAlign:'center'}}>
          <div className="text-4xl mb-2">🚨</div>
          <h3 className="font-black text-lg mb-1" style={{color:form.text_color}}>{form.title||'AVISO'}</h3>
          <p style={{color:form.text_color,opacity:.9,fontSize:14}}>{form.message||'Mensagem de emergência aqui'}</p>
          <div className="absolute top-2 right-2 text-xs px-2 py-0.5 rounded-full bg-black/20" style={{color:form.text_color}}>PRÉVIA</div>
        </div>
      </div>
      <Lbl>Título</Lbl><Inp value={form.title} onChange={v=>setForm(f=>({...f,title:v}))}/>
      <Lbl>Mensagem</Lbl><textarea value={form.message} onChange={e=>setForm(f=>({...f,message:e.target.value}))} rows={3} className="w-full border border-gray-200 rounded-lg px-3 py-2 mb-3 text-sm resize-none focus:outline-none focus:border-blue-400"/>
      <div className="grid grid-cols-2 gap-3 mb-4">
        <div><Lbl>Cor de fundo</Lbl><input type="color" value={form.bg_color} onChange={e=>setForm(f=>({...f,bg_color:e.target.value}))} className="w-full h-10 rounded-lg border border-gray-200 cursor-pointer"/></div>
        <div><Lbl>Cor do texto</Lbl><input type="color" value={form.text_color} onChange={e=>setForm(f=>({...f,text_color:e.target.value}))} className="w-full h-10 rounded-lg border border-gray-200 cursor-pointer"/></div>
      </div>
      <div className="flex gap-2">
        <button onClick={save} className="flex-1 bg-gray-600 hover:bg-gray-700 text-white py-2.5 rounded-lg font-medium transition text-sm">💾 Salvar</button>
        <button onClick={toggle} disabled={loading} className={`flex-1 py-2.5 rounded-lg font-semibold transition text-sm text-white disabled:opacity-50 ${isActive?'bg-green-600 hover:bg-green-700':'bg-red-600 hover:bg-red-700'}`}>{loading?'...':(isActive?'✅ Desativar':'🚨 ATIVAR AGORA')}</button>
      </div>
    </div>
  );
}

                </div>
                <div className="text-right flex-shrink-0">
                  <span className={`text-xs px-2 py-0.5 rounded-full font-medium ${tv.status==='online'?'badge-online':'badge-offline'}`}>{tv.status==='online'?'● Online':'○ Offline'}</span>
                  {tv.playlist_name&&<p className="text-xs text-gray-400 mt-0.5">{tv.playlist_name}</p>}
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {tab==='playback'&&(
        <div>
          <div className="flex gap-2 mb-3">
            <select value={days} onChange={e=>setDays(+e.target.value)} className="border border-gray-200 rounded-lg px-3 py-1.5 text-sm bg-white">
              <option value={1}>Últimas 24h</option><option value={7}>7 dias</option><option value={30}>30 dias</option>
            </select>
            <select value={filterTv} onChange={e=>setFilterTv(e.target.value)} className="flex-1 border border-gray-200 rounded-lg px-3 py-1.5 text-sm bg-white">
              <option value="">Todas as TVs</option>{tvs.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}
            </select>
          </div>
          {loading?<p className="text-xs text-gray-400 text-center py-8">Carregando...</p>:
          <div className="sv-card border border-gray-100 shadow-sm overflow-hidden">
            <div className="divide-y divide-gray-100 max-h-96 overflow-y-auto">
              {playback.length===0&&<p className="text-xs text-gray-400 text-center py-8">Nenhum log neste período</p>}
              {playback.map(p=>(
                <div key={p.id} className="flex items-center gap-3 p-3 hover:bg-gray-50 text-xs">
                  <span>{p.media_type==='youtube'?'▶':p.media_type==='image'?'🖼':p.media_type==='pdf'?'📄':'🎬'}</span>
                  <div className="flex-1 min-w-0">
                    <p className="font-medium text-gray-800 truncate">{p.video_name||'—'}</p>
                    <p className="text-gray-400">{p.tv_name||p.tv_id} · {fmt.dt(p.started_at)}</p>
                  </div>
                  {p.duration_sec>0&&<span className="text-gray-400 flex-shrink-0">{fmt.dur(p.duration_sec)}</span>}
                </div>
              ))}
            </div>
          </div>}
        </div>
      )}

      {tab==='audit'&&(
        <div className="sv-card border border-gray-100 shadow-sm overflow-hidden">
          <div className="divide-y divide-gray-100 max-h-96 overflow-y-auto">
            {audit.length===0&&<p className="text-xs text-gray-400 text-center py-8">Nenhum registro</p>}
            {audit.map(a=>(
              <div key={a.id} className="flex items-start gap-3 p-3 hover:bg-gray-50 text-xs">
                <span className="text-gray-400 flex-shrink-0">{fmt.dt(a.created_at)}</span>
                <div className="flex-1">
                  <span className="font-medium text-gray-700">{a.user||'sistema'}</span>
                  <span className="text-gray-500 mx-1">→</span>
                  <span className="text-blue-600">{a.action}</span>
                  {a.target&&<span className="text-gray-600 ml-1">"{a.target}"</span>}
                  {a.detail&&<span className="text-gray-400 ml-1">({a.detail})</span>}
                </div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ── USUÁRIOS ─────────────────────────────────────────────────────
function UsersPage({showToast}){
  const [users,setUsers]=useState([]);
  const [modal,setModal]=useState(false);const [edit,setEdit]=useState(null);
  const [form,setForm]=useState({username:'',password:'',role:'operator'});
  const load=async()=>{const r=await api.getUsers();Array.isArray(r)&&setUsers(r);};
  useEffect(()=>{load();},[]);
  const open=(u=null)=>{setEdit(u);setForm(u?{username:u.username,password:'',role:u.role}:{username:'',password:'',role:'operator'});setModal(true);};
  const save=async()=>{
    if(!form.username.trim())return;
    if(!edit&&!form.password.trim()){showToast('Senha obrigatória','error');return;}
    const d={username:form.username,role:form.role};
    if(form.password)d.password=form.password;
    const r=edit?await api.updateUser(edit.id,d):await api.createUser(d);
    if(r.error){showToast(r.error,'error');return;}
    setModal(false);load();showToast(edit?'Usuário atualizado!':'Usuário criado!');
  };
  const del=async u=>{if(!confirm(`Remover ${u.username}?`))return;await api.deleteUser(u.id);load();showToast('Removido');};
  const roleColor={admin:'bg-red-100 text-red-700',operator:'bg-blue-100 text-blue-700',viewer:'bg-gray-100 text-gray-700'};
  const roleLabel={admin:'Admin',operator:'Operador',viewer:'Visualizador'};
  return (
    <div className="p-4 md:p-6 fadein max-w-2xl">
      <div className="flex items-center justify-between mb-5">
        <div><h2 className="text-xl md:text-2xl font-bold">Usuários</h2><p className="text-gray-500 text-sm">Gerenciar acesso ao painel</p></div>
        <button onClick={()=>open()} className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium">+ Novo</button>
      </div>
      <div className="bg-blue-50 rounded-xl p-3 mb-4 text-xs text-blue-700">
        <p>🔐 <strong>Admin:</strong> Acesso total · <strong>Operador:</strong> Gerencia conteúdo · <strong>Visualizador:</strong> Apenas leitura</p>
      </div>
      <div className="space-y-2">
        {users.map(u=>(
          <div key={u.id} className="sv-card border border-gray-100 shadow-sm p-4 flex items-center gap-3">
            <div className="w-9 h-9 bg-gray-100 rounded-full flex items-center justify-center text-lg flex-shrink-0">
              {u.role==='admin'?'👑':u.role==='operator'?'👤':'👁'}
            </div>
            <div className="flex-1 min-w-0">
              <p className="font-semibold text-sm">{u.username}</p>
              <p className="text-xs text-gray-400">Criado em {fmt.dt(u.created_at)}</p>
            </div>
            <span className={`text-xs px-2 py-0.5 rounded-full font-medium flex-shrink-0 ${roleColor[u.role]||'bg-gray-100 text-gray-600'}`}>{roleLabel[u.role]||u.role}</span>
            <div className="flex gap-1.5 flex-shrink-0">
              <button onClick={()=>open(u)} className="text-xs border border-gray-200 px-2.5 py-1.5 rounded-lg hover:border-blue-300 hover:text-blue-600 transition">✏️</button>
              {u.username!=='admin'&&<button onClick={()=>del(u)} className="text-xs text-red-400 border border-gray-200 px-2.5 py-1.5 rounded-lg transition">🗑</button>}
            </div>
          </div>
        ))}
        {users.length===0&&<p className="text-center text-gray-400 py-8">Nenhum usuário</p>}
      </div>
      {modal&&<Modal title={edit?`Editar — ${edit.username}`:'Novo Usuário'} onClose={()=>setModal(false)} onSave={save}>
        <Lbl>Nome de usuário</Lbl><Inp value={form.username} onChange={v=>setForm(f=>({...f,username:v}))} disabled={edit?.username==='admin'}/>
        <Lbl>{edit?'Nova senha (deixe vazio para manter)':'Senha'}</Lbl><Inp value={form.password} onChange={v=>setForm(f=>({...f,password:v}))} type="password" placeholder={edit?'••••••••':'Mínimo 6 caracteres'}/>
        <Lbl>Nível de acesso</Lbl>
        <Sel value={form.role} onChange={v=>setForm(f=>({...f,role:v}))}>
          <option value="admin">👑 Admin — Acesso total</option>
          <option value="operator">👤 Operador — Gerencia conteúdo</option>
          <option value="viewer">👁 Visualizador — Apenas leitura</option>
        </Sel>
      </Modal>}
    </div>
  );
}

// ── APARÊNCIA ────────────────────────────────────────────────────
const THEMES_PRESET = [
  {name:'Escuro padrão',  sidebarBg:'#111827',sidebarText:'#9ca3af',sidebarActive:'#2563eb',accentColor:'#2563eb'},
  {name:'Azul oceano',    sidebarBg:'#0c1a3a',sidebarText:'#93c5fd',sidebarActive:'#3b82f6',accentColor:'#3b82f6'},
  {name:'Verde floresta', sidebarBg:'#052e16',sidebarText:'#86efac',sidebarActive:'#16a34a',accentColor:'#16a34a'},
  {name:'Roxo elegante',  sidebarBg:'#1e1b4b',sidebarText:'#c4b5fd',sidebarActive:'#7c3aed',accentColor:'#7c3aed'},
  {name:'Grafite',        sidebarBg:'#1c1c1e',sidebarText:'#8e8e93',sidebarActive:'#ff9f0a',accentColor:'#ff9f0a'},
  {name:'Vermelho forte', sidebarBg:'#1c0a0a',sidebarText:'#fca5a5',sidebarActive:'#dc2626',accentColor:'#dc2626'},
  {name:'Branco limpo',   sidebarBg:'#ffffff',sidebarText:'#6b7280',sidebarActive:'#2563eb',accentColor:'#2563eb'},
  {name:'Marrom madeira', sidebarBg:'#292118',sidebarText:'#d6c8b0',sidebarActive:'#d97706',accentColor:'#d97706'},
];

function AppearancePage({theme,setTheme,showToast}){
  const [form,setForm]=useState({...theme});
  const [saving,setSaving]=useState(false);
  const [logoUploading,setLogoUploading]=useState(false);
  const fileRef=useRef();
  const restoreRef=useRef();

  // ── Backup / Restore ────────────────────────────────────────────
  const [restoring,setRestoring]=useState(false);
  const [restoreResult,setRestoreResult]=useState(null);

  const doBackup=async()=>{
    try{
      const h={};if(TOKEN)h['Authorization']=`Bearer ${TOKEN}`;
      const r=await fetch(`${API}/backup`,{headers:h});
      if(!r.ok){showToast('Erro ao gerar backup','error');return;}
      const blob=await r.blob();
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=url;
      a.download=`smartvision-backup-${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
      showToast('✅ Backup baixado com sucesso!');
    }catch(e){showToast('Erro: '+e.message,'error');}
  };

  const doRestore=async file=>{
    if(!file)return;
    if(!confirm('Restaurar backup? Dados existentes com o mesmo ID serão mantidos — novos serão adicionados.'))return;
    setRestoring(true);setRestoreResult(null);
    try{
      const text=await file.text();
      const data=JSON.parse(text);
      const h={};if(TOKEN)h['Authorization']=`Bearer ${TOKEN}`;h['Content-Type']='application/json';
      const r=await fetch(`${API}/backup/restore`,{method:'POST',headers:h,body:JSON.stringify(data)});
      const j=await r.json();
      if(j.error){showToast(j.error,'error');setRestoring(false);return;}
      setRestoreResult(j.report);
      showToast('✅ Backup restaurado!');
    }catch(e){showToast('Arquivo inválido: '+e.message,'error');}
    setRestoring(false);
  };

  useEffect(()=>setForm({...theme}),[theme]);

  const set=(k,v)=>setForm(f=>({...f,[k]:v}));

  const uploadPanelLogo=async file=>{
    if(!file)return;
    setLogoUploading(true);
    try{
      const r=await api.uploadLogo(file,'panel');
      if(r.url)set('panelLogo',r.url);
      else if(r.error)showToast(r.error,'error');
    }catch(e){showToast('Erro no upload','error');}
    setLogoUploading(false);
  };

  const save=async()=>{
    setSaving(true);
    try{
      await api.saveSettings(form);
      setTheme(form);
      showToast('🎨 Aparência salva com sucesso!');
    }catch{showToast('Erro ao salvar','error');}
    setSaving(false);
  };

  const removeLogo=async()=>{
    set('panelLogo','');
  };

  // Preview da sidebar
  const PreviewSidebar=()=>(
    <div className="rounded-xl overflow-hidden shadow-xl" style={{width:150,background:form.sidebarBg,minHeight:280,display:'flex',flexDirection:'column'}}>
      <div style={{padding:'14px 12px',borderBottom:'1px solid rgba(255,255,255,.08)'}}>
        {form.panelLogo
          ? <img src={form.panelLogo} alt="Logo" style={{height:28,maxWidth:110,objectFit:'contain',borderRadius:3}}/>
          : <div style={{display:'flex',alignItems:'center',gap:6}}>
              <span style={{fontSize:20}}>📺</span>
              <span style={{fontWeight:700,fontSize:12,color:'#fff'}}>{form.panelName||'SmartVision Pro'}</span>
            </div>
        }
        <p style={{fontSize:10,color:'rgba(255,255,255,.3)',marginTop:2}}>admin</p>
      </div>
      <div style={{padding:8,flex:1,display:'flex',flexDirection:'column',gap:2}}>
        {['Dashboard','TVs','Mídias','Playlists'].map((l,i)=>(
          <div key={l} style={{
            padding:'7px 10px',borderRadius:8,fontSize:11,
            background:i===0?form.sidebarActive:'transparent',
            color:i===0?'#fff':form.sidebarText,
          }}>{l}</div>
        ))}
      </div>
      <div style={{padding:8,borderTop:'1px solid rgba(255,255,255,.07)'}}>
        <div style={{padding:'6px 10px',borderRadius:8,fontSize:10,background:'rgba(255,255,255,.06)',color:form.sidebarText,textAlign:'center'}}>🔄 Recarregar TVs</div>
      </div>
    </div>
  );

  return (
    <div className="p-4 md:p-6 fadein max-w-3xl">
      <h2 className="text-xl md:text-2xl font-bold mb-1">🎨 Aparência do Painel</h2>
      <p className="text-gray-500 text-sm mb-6">Personalize cores, logo e nome do sistema</p>

      <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
        {/* Coluna esquerda — configurações */}
        <div className="space-y-5">

          {/* Logo do painel */}
          <div className="sv-card border border-gray-100 shadow-sm p-4">
            <h3 className="font-semibold text-sm mb-3">🖼 Logo do painel</h3>
            <div onClick={()=>fileRef.current?.click()}
              className={`border-2 border-dashed rounded-xl p-4 text-center cursor-pointer transition mb-3 ${form.panelLogo?'border-green-300 bg-green-50':'border-gray-200 hover:border-blue-300'}`}>
              {logoUploading
                ? <p className="text-sm text-blue-600">⏳ Enviando...</p>
                : form.panelLogo
                  ? <div>
                      <img src={form.panelLogo} alt="Logo" className="mx-auto mb-2" style={{maxHeight:52,maxWidth:'100%',objectFit:'contain'}}/>
                      <p className="text-xs text-green-600 font-medium">✅ Clique para trocar</p>
                    </div>
                  : <div><div className="text-2xl mb-1">🖼</div><p className="text-sm text-gray-500">Clique para enviar</p><p className="text-xs text-gray-400">PNG, JPG, GIF, WebP · Máx. 10 MB</p></div>
              }
            </div>
            <input ref={fileRef} type="file" accept="image/png,image/jpeg,image/jpg,image/gif,image/webp" className="hidden"
              onChange={e=>uploadPanelLogo(e.target.files?.[0])}/>
            {form.panelLogo
              ? <button onClick={removeLogo} className="w-full text-xs text-red-500 border border-red-200 rounded-lg py-1.5 hover:bg-red-50 transition">🗑 Remover logo</button>
              : <>
                  <Lbl>Nome exibido (sem logo)</Lbl>
                  <Inp value={form.panelName||''} onChange={v=>set('panelName',v)} placeholder="SmartVision Pro"/>
                </>
            }
          </div>

          {/* Presets de tema */}
          <div className="sv-card border border-gray-100 shadow-sm p-4">
            <h3 className="font-semibold text-sm mb-3">⚡ Temas prontos</h3>
            <div className="grid grid-cols-2 gap-1.5">
              {THEMES_PRESET.map(t=>(
                <button key={t.name} onClick={()=>setForm(f=>({...f,...t}))}
                  className="flex items-center gap-2 px-2.5 py-2 rounded-lg border border-gray-200 hover:border-blue-300 transition text-xs text-left">
                  <div className="flex gap-0.5 flex-shrink-0">
                    <div style={{width:10,height:20,background:t.sidebarBg,borderRadius:'3px 0 0 3px'}}/>
                    <div style={{width:10,height:20,background:t.sidebarActive,borderRadius:'0 3px 3px 0'}}/>
                  </div>
                  <span className="truncate">{t.name}</span>
                </button>
              ))}
            </div>
          </div>

          {/* Cores personalizadas */}
          <div className="sv-card border border-gray-100 shadow-sm p-4">
            <h3 className="font-semibold text-sm mb-3">🖌 Cores personalizadas</h3>
            <div className="grid grid-cols-2 gap-3">
              {[
                ['sidebarBg',   'Fundo da sidebar'],
                ['sidebarText', 'Texto inativo'],
                ['sidebarActive','Item ativo'],
                ['accentColor', 'Cor de destaque'],
              ].map(([k,label])=>(
                <div key={k}>
                  <Lbl>{label}</Lbl>
                  <div className="flex items-center gap-2 mb-3">
                    <input type="color" value={form[k]||'#000000'} onChange={e=>set(k,e.target.value)}
                      className="w-10 h-9 rounded border border-gray-200 cursor-pointer flex-shrink-0"/>
                    <input type="text" value={form[k]||''} onChange={e=>set(k,e.target.value)}
                      className="flex-1 border border-gray-200 rounded-lg px-2 py-1.5 text-xs font-mono focus:outline-none focus:border-blue-400" placeholder="#000000"/>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>

        {/* Coluna direita — preview */}
        <div>
          <div className="sticky top-4">
            <div className="sv-card border border-gray-100 shadow-sm p-4 mb-4">
              <h3 className="font-semibold text-sm mb-3">👁 Preview ao vivo</h3>
              <div className="flex justify-center">
                <PreviewSidebar/>
              </div>
              <p className="text-xs text-gray-400 text-center mt-3">Reflita as alterações em tempo real</p>
            </div>
            <button onClick={save} disabled={saving}
              className="w-full py-3 rounded-xl text-white font-semibold transition disabled:opacity-50 shadow-lg"
              style={{background:form.accentColor||'#2563eb',boxShadow:`0 4px 14px ${(form.accentColor||'#2563eb')}44`}}>
              {saving?'Salvando...':'💾 Salvar aparência'}
            </button>
            <p className="text-xs text-gray-400 text-center mt-2">As cores são aplicadas imediatamente ao salvar</p>

            {/* ── Backup / Restore ── */}
            <div className="mt-6 pt-6 border-t border-gray-100">
              <h3 className="font-semibold text-gray-800 mb-1">📦 Backup e Restauração</h3>
              <p className="text-xs text-gray-400 mb-4">Salva TVs cadastradas, playlists e agendamentos. <strong>Não inclui arquivos de mídia.</strong></p>
              <div className="flex gap-3">
                <button onClick={doBackup}
                  className="flex-1 flex items-center justify-center gap-2 py-2.5 rounded-xl border-2 border-blue-200 text-blue-700 bg-blue-50 hover:bg-blue-100 text-sm font-semibold transition">
                  ⬇️ Baixar backup
                </button>
                <button onClick={()=>restoreRef.current?.click()} disabled={restoring}
                  className="flex-1 flex items-center justify-center gap-2 py-2.5 rounded-xl border-2 border-green-200 text-green-700 bg-green-50 hover:bg-green-100 text-sm font-semibold transition disabled:opacity-50">
                  {restoring?'⏳ Restaurando…':'⬆️ Restaurar backup'}
                </button>
                <input ref={restoreRef} type="file" accept=".json" className="hidden"
                  onChange={e=>{doRestore(e.target.files?.[0]);e.target.value='';}}/>
              </div>
              {restoreResult&&<div className="mt-3 bg-gray-50 border border-gray-200 rounded-xl p-3 text-xs text-gray-600">
                <p className="font-semibold text-gray-800 mb-1">✅ Restauração concluída:</p>
                <div className="grid grid-cols-3 gap-1">
                  {[['TVs',restoreResult.tvs],['Playlists',restoreResult.playlists],['Vínculos',restoreResult.playlist_videos],['Agendamentos',restoreResult.schedules],['Widgets',restoreResult.widgets],['Ignorados',restoreResult.skipped]].map(([l,v])=>(
                    <div key={l} className="sv-card p-2 text-center border border-gray-100">
                      <div className="text-lg font-bold text-gray-800">{v}</div>
                      <div className="text-gray-400">{l}</div>
                    </div>
                  ))}
                </div>
              </div>}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
